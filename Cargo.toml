[workspace]
members = [
    "crates/krishiv-api",
    "crates/krishiv-catalog",
    "crates/krishiv-checkpoint",
    "crates/krishiv-cli",
    "crates/krishiv-connectors",
    "crates/krishiv-executor",
    "crates/krishiv-exec",
    "crates/krishiv-optimizer",
    "crates/krishiv-plan",
    "crates/krishiv-proto",
    "crates/krishiv-operator",
    "crates/krishiv-runtime",
    "crates/krishiv-scheduler",
    "crates/krishiv-shuffle",
    "crates/krishiv-sql",
    "crates/krishiv-state",
    "crates/krishiv-udf",
    "crates/krishiv-ui",
    "crates/krishiv-python",
    "crates/krishiv-lakehouse",
    "crates/krishiv-flight-sql",
    "crates/krishiv-metrics",
    "crates/krishiv-governance",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"

[workspace.dependencies]
arrow = { version = "55.1.0", features = ["prettyprint"] }
arrow-flight = { version = "55.1.0", features = ["flight-sql-experimental"] }
pyo3 = { version = "0.28", features = ["extension-module"] }
iceberg = "0.9"
async-trait = "0.1"
bytes = "1"
object_store = "0.12"
askama = "0.12"
axum = "0.8"
datafusion = "48.0.1"
futures = "0.3"
k8s-openapi = { version = "0.26.1", features = ["v1_31"] }
kube = { version = "2.0.1", features = ["runtime"] }
parquet = "55.1.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tempfile = "3"
prost = "0.14.3"
prost-build = "0.14.1"
protoc-bin-vendored = "3.2.0"
tokio = { version = "1.45", features = ["macros", "net", "rt", "rt-multi-thread", "time"] }
tokio-stream = { version = "0.1.18", features = ["net"] }
tonic = { version = "0.14.5", features = ["transport"] }
tonic-prost = "0.14.5"
tonic-prost-build = "0.14.5"
tower = "0.5"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
tracing-opentelemetry = "0.28"
opentelemetry = { version = "0.27", features = ["trace"] }
opentelemetry_sdk = { version = "0.27", features = ["rt-tokio", "trace"] }
opentelemetry-stdout = { version = "0.27", features = ["trace"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
uuid = { version = "1", features = ["v4"] }

[workspace.lints.rust]
unsafe_code = "forbid"
