[workspace]
members = [
    "crates/krishiv-api",
    "crates/krishiv-cli",
    "crates/krishiv-executor",
    "crates/krishiv-exec",
    "crates/krishiv-plan",
    "crates/krishiv-proto",
    "crates/krishiv-operator",
    "crates/krishiv-runtime",
    "crates/krishiv-scheduler",
    "crates/krishiv-sql",
    "crates/krishiv-ui",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"

[workspace.dependencies]
arrow = { version = "55.1.0", features = ["prettyprint"] }
askama = "0.12"
axum = "0.8"
datafusion = "48.0.1"
futures = "0.3"
k8s-openapi = { version = "0.26.1", features = ["v1_31"] }
kube = { version = "2.0.1", features = ["runtime"] }
parquet = "55.1.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
tokio = { version = "1.45", features = ["macros", "rt", "rt-multi-thread"] }
tower = "0.5"

[workspace.lints.rust]
unsafe_code = "forbid"
