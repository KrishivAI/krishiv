[[breaking]]
id = "rust-public.json:items/crates/krishiv-api/src/io.rs::fn::load::pub fn load(self, path: impl AsRef<Path>) -> Result<DataFrame>"
reason = "Sync/async audit: krishiv_common::async_util::block_on's current-thread fallback path could still panic with \"Cannot start a runtime from within a runtime\" (Tokio's nesting guard is per-OS-thread, not per-runtime-instance); the fix hops to a fresh OS thread, which requires the driven future to be Send. `load`'s generic `path` parameter needed `+ Send` so its `block_on(self.load_async(path))` call type-checks."
replacement = "DataFrameReader::load(self, path: impl AsRef<Path> + Send)"

