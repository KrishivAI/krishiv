[[breaking]]
id = "rust-public.json:items/crates/krishiv-api/src/session.rs::fn::sql::pub fn sql(&self, query: impl AsRef<str>) -> Result<DataFrame>"
reason = "Sync/async audit: krishiv_common::async_util::block_on's current-thread fallback path used to call `.block_on` on a separate fallback runtime while the calling thread already had an entered runtime context, which still panics (Tokio's nesting guard is per-OS-thread, not per-runtime-instance). Fixed by hopping to a fresh OS thread via `std::thread::scope`, which requires the driven future (and its output) to be Send; Session::sql's generic query parameter needed `+ Send` for its `block_on(self.sql_async(query))` call to type-check."
replacement = "Session::sql(&self, query: impl AsRef<str> + Send)"

