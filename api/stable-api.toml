schema_version = 1

[policy]
canonical_relational_type = "DataFrame"
rust_execution = "async-first"
python_execution = "sync-convenience-and-asyncio"
sql_protocol = "flight-sql-first"

[[phases]]
id = "A"
name = "Inventory and stability labels"
status = "implemented"
exit_criteria = "Public inventories and parity metadata are validated in CI."

[[phases]]
id = "B"
name = "Expression and type AST"
status = "implemented"
exit_criteria = "Rust, Python, and SQL lower equivalent expressions to one versioned AST."

[[phases]]
id = "C"
name = "Canonical DataFrame and catalog"
status = "implemented"
exit_criteria = "One DataFrame identity and cross-language relational conformance."

[[phases]]
id = "D"
name = "I/O, connectors, and Iceberg"
status = "implemented"
exit_criteria = "Typed options and certified distributed atomic commits."

[[phases]]
id = "E"
name = "Query lifecycle and async correctness"
status = "implemented"
exit_criteria = "One QueryHandle path with cancellation, progress, timeout, and true awaitables."

[[phases]]
id = "F"
name = "Structured streaming"
status = "todo"
exit_criteria = "Unified bounded/unbounded relational source-to-sink API."

[[phases]]
id = "G"
name = "Stateful process API"
status = "todo"
exit_criteria = "Typed process functions, state, timers, side outputs, and rescaling restore."

[[phases]]
id = "H"
name = "SQL and gateway completeness"
status = "todo"
exit_criteria = "Published grammar, complete Iceberg DML, prepared statements, and operation control."

[[phases]]
id = "I"
name = "1.0 stability gate"
status = "todo"
exit_criteria = "Compatibility, parity, semantics, modes, durability, packaging, and performance gates pass."

