# External services for the opt-in `just test-external` tier (audit §14
# TEST-6): every `#[ignore = "requires …"]` external-service test gets a
# provisioned backend so the tier actually runs instead of being false-green.
#
#   scripts/dev/external-test-services.sh up     # start + create bucket
#   just test-external                           # run the ignored tests
#   scripts/dev/external-test-services.sh down   # tear down
#
# Host ports are chosen to avoid the local k3s stack (MinIO :9000/:9001/:9100,
# OTLP :4317) and any local Postgres (:5432).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: krishiv
      POSTGRES_PASSWORD: krishiv
      POSTGRES_DB: krishiv_test
    ports:
      - "127.0.0.1:5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U krishiv -d krishiv_test"]
      interval: 2s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "127.0.0.1:9102:9000"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 3s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector:latest
    ports:
      - "127.0.0.1:4319:4317"
