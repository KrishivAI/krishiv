<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 52" role="img" aria-label="Krishiv">
  <title>Krishiv</title>
  <desc>Krishiv wordmark — Rust-native compute engine for batch, streaming, and incremental processing.</desc>
  <rect width="210" height="52" rx="10" fill="#0B1020"/>
  <!-- Mark (48×48 content at offset 2,2) -->
  <g transform="translate(2,2)" fill="#F59E0B">
    <rect x="4"  y="10" width="5" height="12" rx="2"/>
    <rect x="11" y="6"  width="5" height="16" rx="2"/>
    <rect x="18" y="10" width="5" height="12" rx="2"/>
    <rect x="8"  y="22" width="9" height="20" rx="1"/>
  </g>
  <g transform="translate(2,2)">
    <line x1="17" y1="32" x2="42" y2="20" stroke="#F59E0B" stroke-width="7" stroke-linecap="round"/>
    <line x1="17" y1="32" x2="42" y2="44" stroke="#F59E0B" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="60" y="35" fill="#F5F7FB"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif"
    font-size="26" font-weight="700" letter-spacing="-0.03em">Krishiv</text>
</svg>
