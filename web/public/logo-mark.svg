<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Krishiv mark">
  <title>Krishiv mark</title>
  <desc>K monogram with three trishul prongs at top: Batch, Streaming, Incremental.</desc>
  <rect width="48" height="48" rx="10" fill="#0B1020"/>
  <g fill="#F59E0B">
    <!-- Trishul: left prong (shorter) -->
    <rect x="4"  y="10" width="5" height="12" rx="2"/>
    <!-- Trishul: center prong (tallest) -->
    <rect x="11" y="6"  width="5" height="16" rx="2"/>
    <!-- Trishul: right prong (shorter) -->
    <rect x="18" y="10" width="5" height="12" rx="2"/>
    <!-- K: vertical stem -->
    <rect x="8"  y="22" width="9" height="20" rx="1"/>
  </g>
  <!-- K: upper arm -->
  <line x1="17" y1="32" x2="42" y2="20" stroke="#F59E0B" stroke-width="7" stroke-linecap="round"/>
  <!-- K: lower arm -->
  <line x1="17" y1="32" x2="42" y2="44" stroke="#F59E0B" stroke-width="7" stroke-linecap="round"/>
</svg>
