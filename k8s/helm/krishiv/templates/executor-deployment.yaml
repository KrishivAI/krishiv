apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "krishiv.fullname" . }}-executor
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "krishiv.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
spec:
  replicas: {{ .Values.executor.replicas }}
  selector:
    matchLabels:
      {{- include "krishiv.executorSelectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "krishiv.executorSelectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "krishiv.serviceAccountName" . }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: executor
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["krishiv-executor"]
          args:
            - "--coordinator=http://{{ include "krishiv.fullname" . }}-coordinator:{{ .Values.coordinator.port }}"
            - "--listen=0.0.0.0:{{ .Values.executor.port }}"
          ports:
            - name: grpc
              containerPort: {{ .Values.executor.port }}
              protocol: TCP
          env:
            - name: KRISHIV_SERVICE_NAME
              value: {{ .Values.observability.serviceName | quote }}
            {{- if .Values.observability.otlpEndpoint }}
            - name: KRISHIV_OTLP_ENDPOINT
              value: {{ .Values.observability.otlpEndpoint | quote }}
            {{- end }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            {{- toYaml .Values.executor.resources | nindent 12 }}
          readinessProbe:
            grpc:
              port: {{ .Values.executor.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: {{ .Values.executor.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
