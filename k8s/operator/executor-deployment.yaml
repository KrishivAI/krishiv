apiVersion: apps/v1
kind: Deployment
metadata:
  name: krishiv-executor
  namespace: krishiv-system
  labels:
    app.kubernetes.io/name: krishiv
    app.kubernetes.io/component: executor
    app.kubernetes.io/part-of: krishiv
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: krishiv
      app.kubernetes.io/component: executor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: krishiv
        app.kubernetes.io/component: executor
        app.kubernetes.io/part-of: krishiv
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: krishiv-controller
      containers:
        - name: executor
          image: localhost/krishiv:local
          imagePullPolicy: Never
          command:
            - /usr/local/bin/krishiv
          args:
            - executor
            - --coordinator
            - http://krishiv-coordinator.krishiv-system.svc:9090
            - --connect
            - --heartbeat-interval-secs
            - "1"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: KRISHIV_EXECUTOR_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KRISHIV_TASK_SLOTS
              value: "1"
            - name: KRISHIV_REQUIRE_EXECUTOR_TASK_AUTH
              value: "true"
            - name: KRISHIV_COORDINATOR_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: krishiv-coordinator-auth
                  key: token
            - name: KRISHIV_EXECUTOR_TASK_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: krishiv-executor-task-auth
                  key: token
          volumeMounts:
            - name: tpch-data
              mountPath: /home/code/krishiv/tpch_sf10
      volumes:
        - name: tpch-data
          hostPath:
            path: /home/code/krishiv/tpch_sf10
            type: Directory
