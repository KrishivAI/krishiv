apiVersion: v1
kind: Service
metadata:
  name: krishiv-coordinator
  namespace: krishiv-system
  labels:
    app.kubernetes.io/name: krishiv
    app.kubernetes.io/component: operator
    app.kubernetes.io/part-of: krishiv
spec:
  type: ClusterIP
  # Executors register through this Service, but the coordinator's /readyz is
  # gated on having ≥1 registered executor — so the address must be published
  # before the pod is Ready, otherwise the cluster deadlocks on bootstrap.
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: krishiv
    app.kubernetes.io/component: operator
  ports:
    - name: grpc
      port: 2001
      targetPort: grpc
    - name: http
      port: 2002
      targetPort: http
    - name: flight
      port: 2003
      targetPort: flight
---
# NodePort for external access to coordinator HTTP (diagnostics / jobs API)
apiVersion: v1
kind: Service
metadata:
  name: krishiv-coordinator-ext
  namespace: krishiv-system
  labels:
    app.kubernetes.io/name: krishiv
    app.kubernetes.io/component: operator
    app.kubernetes.io/part-of: krishiv
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: krishiv
    app.kubernetes.io/component: operator
  ports:
    - name: http
      port: 2002
      targetPort: http
      nodePort: 30002
---
# NodePort for external access to Flight SQL
apiVersion: v1
kind: Service
metadata:
  name: krishiv-coordinator-flight-ext
  namespace: krishiv-system
  labels:
    app.kubernetes.io/name: krishiv
    app.kubernetes.io/component: operator
    app.kubernetes.io/part-of: krishiv
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: krishiv
    app.kubernetes.io/component: operator
  ports:
    - name: flight
      port: 2003
      targetPort: flight
      nodePort: 30003
