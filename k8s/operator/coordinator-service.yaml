apiVersion: v1
kind: Service
metadata:
  name: krishiv-coordinator
  namespace: krishiv-system
  labels:
    app.kubernetes.io/name: krishiv
    app.kubernetes.io/component: operator
    app.kubernetes.io/part-of: krishiv
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: krishiv
    app.kubernetes.io/component: operator
  ports:
    - name: http
      port: 2002
      targetPort: http
    - name: grpc
      port: 2001
      targetPort: grpc
