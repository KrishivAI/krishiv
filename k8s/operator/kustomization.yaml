apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # CRDs (referenced as a kustomization directory, not individual files)
  - ../crds
  # Namespace and access control
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml
  # Control plane
  - operator-deployment.yaml
  - coordinator-service.yaml
  - executor-deployment.yaml
  - network-policy.yaml
  # Example workloads
  - samples/krishivjob-batch.yaml
  - samples/krishivjob-streaming.yaml
