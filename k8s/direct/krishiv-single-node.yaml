apiVersion: v1
kind: Service
metadata:
  name: krishiv-single-node
  namespace: default
  labels:
    app: krishiv-single-node
spec:
  ports:
  - port: 18080
    name: http
    targetPort: 18080
  - port: 50051
    name: flight
    targetPort: 50051
  - port: 9090
    name: grpc
    targetPort: 9090
  selector:
    app: krishiv-single-node
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: krishiv-single-node
  namespace: default
spec:
  selector:
    matchLabels:
      app: krishiv-single-node
  replicas: 1
  template:
    metadata:
      labels:
        app: krishiv-single-node
    spec:
      containers:
      - name: krishiv
        image: localhost/krishiv:local
        imagePullPolicy: Never
        command: ["/bin/sh", "-c"]
        args:
        - |
          # Start the single-node daemon processes
          /usr/local/bin/krishiv local start --data-dir /tmp/krishiv-cluster
          
          # Wait a moment for log files to be created
          sleep 2
          
          # Tail all component logs to keep the pod alive and stream logs to stdout
          tail -f /tmp/krishiv-cluster/*.log
        ports:
        - containerPort: 18080
          name: http
        - containerPort: 50051
          name: flight
        - containerPort: 9090
          name: grpc
