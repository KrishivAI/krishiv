# Krishiv single-node k3s / single-host distributed developer deployment.
#
# Topology:
#   clusterd   (1 pod)  — gRPC :2001, HTTP :2002, Flight SQL :2003
#   executor   (2 pods) — task gRPC :2005, barrier gRPC :2006,
#                         shuffle Flight :2004, health HTTP :2002
#
# Usage:
#   kubectl apply -f k8s/direct/krishiv-distributed.yaml
#
# Prerequisites:
#   - Namespace krishiv-system must exist
#   - Container image localhost/krishiv:local must be imported into k3s containerd
#   - Secret krishiv-system/krishiv-coordinator-auth with key `token` must exist
#     (optional key `tokens` may hold comma/newline separated rotation tokens;
#      coordinator pods reload the mounted Secret every 30 seconds)
#   - Secret krishiv-system/krishiv-executor-task-auth with key `token` must exist
#   - For production distributed-durable: build with `full`/`k8s` features and
#     provide etcd plus object-store shuffle/checkpoint URIs.

---
# ── Namespace ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: krishiv-system

---
# ── ServiceAccounts ───────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: krishiv-coordinator
  namespace: krishiv-system

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: krishiv-executor
  namespace: krishiv-system

---
# ── RBAC: coordinator needs read on pods for health checks ────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: krishiv-coordinator
  namespace: krishiv-system
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: krishiv-coordinator
  namespace: krishiv-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: krishiv-coordinator
subjects:
  - kind: ServiceAccount
    name: krishiv-coordinator
    namespace: krishiv-system

---
# ── NetworkPolicy: executor egress for coordinator + peer shuffle ─────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: krishiv-executor-egress
  namespace: krishiv-system
spec:
  podSelector:
    matchLabels:
      app: krishiv-executor
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: krishiv-coordinator
      ports:
        - port: 2001
          protocol: TCP
        - port: 2002
          protocol: TCP
        - port: 2003
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: krishiv-executor
      ports:
        - port: 2004
          protocol: TCP
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP

---
# ── Coordinator local storage ─────────────────────────────────────────────────
# Reserved for developer/local-durable overrides. The default clusterd command
# below runs with dev-local durability; production recovery requires etcd and
# object-store checkpoint/shuffle URIs.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: krishiv-coordinator-data
  namespace: krishiv-system
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

---
# ── Cluster control plane ─────────────────────────────────────────────────────
# This manifest intentionally uses dev-local durability for single-host k3s.
# For HA, run multiple `clusterd` replicas with distributed-durable, etcd
# metadata/leader election, and shared object-store checkpoint/shuffle URIs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coordinator
  namespace: krishiv-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: krishiv-coordinator
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: krishiv-coordinator
    spec:
      serviceAccountName: krishiv-coordinator
      containers:
        - name: coordinator
          image: localhost/krishiv:local
          imagePullPolicy: Never
          command:
            - /usr/local/bin/krishiv
            - clusterd
            - --grpc-addr
            - 0.0.0.0:2001
            - --http-addr
            - 0.0.0.0:2002
            - --flight-addr
            - 0.0.0.0:2003
            - --durability-profile
            - dev-local
          ports:
            - name: grpc
              containerPort: 2001
            - name: http
              containerPort: 2002
            - name: flight
              containerPort: 2003
          env:
            - name: KRISHIV_COORDINATOR_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: krishiv-coordinator-auth
                  key: token
            - name: KRISHIV_COORDINATOR_BEARER_TOKENS
              valueFrom:
                secretKeyRef:
                  name: krishiv-coordinator-auth
                  key: tokens
                  optional: true
            - name: KRISHIV_COORDINATOR_BEARER_TOKEN_FILE
              value: /var/run/krishiv/coordinator-auth/token
            - name: KRISHIV_COORDINATOR_BEARER_TOKENS_FILE
              value: /var/run/krishiv/coordinator-auth/tokens
            - name: KRISHIV_COORDINATOR_AUTH_RELOAD_INTERVAL_SECS
              value: "30"
            - name: KRISHIV_EXECUTOR_TASK_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: krishiv-executor-task-auth
                  key: token
          volumeMounts:
            - name: coordinator-auth
              mountPath: /var/run/krishiv/coordinator-auth
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 2002
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 2002
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
      volumes:
        - name: coordinator-auth
          secret:
            secretName: krishiv-coordinator-auth
        - name: data
          persistentVolumeClaim:
            claimName: krishiv-coordinator-data

---
apiVersion: v1
kind: Service
metadata:
  name: coordinator
  namespace: krishiv-system
spec:
  selector:
    app: krishiv-coordinator
  ports:
    - name: grpc
      port: 2001
      targetPort: 2001
    - name: http
      port: 2002
      targetPort: 2002
    - name: flight
      port: 2003
      targetPort: 2003

---
# NodePort for external access to coordinator HTTP (diagnostics / jobs API)
apiVersion: v1
kind: Service
metadata:
  name: coordinator-ext
  namespace: krishiv-system
spec:
  type: NodePort
  selector:
    app: krishiv-coordinator
  ports:
    - name: http
      port: 2002
      targetPort: 2002
      nodePort: 30002

---
# NodePort for external access to co-located Flight SQL
apiVersion: v1
kind: Service
metadata:
  name: coordinator-flight-ext
  namespace: krishiv-system
spec:
  type: NodePort
  selector:
    app: krishiv-coordinator
  ports:
    - name: flight
      port: 2003
      targetPort: 2003
      nodePort: 30003

---
# ── Executor ──────────────────────────────────────────────────────────────────
# Each pod advertises its real pod IP (via POD_IP downward API) so the
# coordinator can call back on the task gRPC service.
# Shuffle partitions use executor-local disk plus peer shuffle Flight on :2004.
# No hostPath mount is required for this single-host developer manifest.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: executor
  namespace: krishiv-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: krishiv-executor
  template:
    metadata:
      labels:
        app: krishiv-executor
    spec:
      serviceAccountName: krishiv-executor
      # Spread executor replicas across nodes so a single node failure
      # does not take down the entire compute layer (O5).
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: krishiv-executor
                topologyKey: kubernetes.io/hostname
      containers:
        - name: executor
          image: localhost/krishiv:local
          imagePullPolicy: Never
          command:
            - /usr/local/bin/krishiv
            - executor
            - --connect
            - --coordinator
            - http://coordinator.krishiv-system.svc:2001
            - --heartbeat-interval-secs
            - "10"
            - --slots
            - "2"
            - --http-addr
            - 0.0.0.0:2002
            - --task-grpc-addr
            - 0.0.0.0:2005
            - --barrier-grpc-addr
            - 0.0.0.0:2006
            # dev-local profile: ephemeral window state + explicit shuffle dir.
            # For single-node-durable (survives restart):
            #   --durability-profile single-node-durable
            #   (shuffle-dir and state-dir are auto-selected from /tmp defaults)
            - --durability-profile
            - dev-local
            # S5: Explicit shuffle dir overrides the dev-local default (in-memory)
            # so multi-stage queries don't exhaust executor pod memory.
            - --shuffle-dir
            - /tmp/krishiv-shuffle
            - --shuffle-flight-addr
            - 0.0.0.0:2004
          ports:
            - name: health
              containerPort: 2002
            - name: shuffle-flight
              containerPort: 2004
            - name: task-grpc
              containerPort: 2005
            - name: barrier-grpc
              containerPort: 2006
          env:
            - name: KRISHIV_EXECUTOR_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: KRISHIV_REQUIRE_EXECUTOR_TASK_AUTH
              value: "true"
            - name: KRISHIV_COORDINATOR_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: krishiv-coordinator-auth
                  key: token
            - name: KRISHIV_EXECUTOR_TASK_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: krishiv-executor-task-auth
                  key: token
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 2002
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 2002
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          # Give Kubernetes time to remove this pod from Services before the
          # executor handles SIGTERM by deregistering from the coordinator.
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "sleep 5"
      terminationGracePeriodSeconds: 60
