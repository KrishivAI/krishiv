apiVersion: apps/v1
kind: Deployment
metadata:
  name: krishiv-coordinator
  namespace: krishiv-system
  labels:
    app.kubernetes.io/name: krishiv
    app.kubernetes.io/component: coordinator
    app.kubernetes.io/part-of: krishiv
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: krishiv
      app.kubernetes.io/component: coordinator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: krishiv
        app.kubernetes.io/component: coordinator
        app.kubernetes.io/part-of: krishiv
    spec:
      serviceAccountName: krishiv-controller
      containers:
        - name: coordinator
          image: ghcr.io/krishiv/krishiv:dev
          imagePullPolicy: IfNotPresent
          args:
            - coordinator
            - --mode
            - kubernetes
          ports:
            - name: http
              containerPort: 8080
            - name: rpc
              containerPort: 9090
          env:
            - name: KRISHIV_COORDINATOR_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KRISHIV_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
