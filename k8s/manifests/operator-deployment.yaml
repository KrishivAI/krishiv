apiVersion: apps/v1
kind: Deployment
metadata:
  name: krishiv-operator
  namespace: krishiv-system
  labels:
    app.kubernetes.io/name: krishiv
    app.kubernetes.io/component: operator
    app.kubernetes.io/part-of: krishiv
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: krishiv
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: krishiv
        app.kubernetes.io/component: operator
        app.kubernetes.io/part-of: krishiv
    spec:
      serviceAccountName: krishiv-controller
      containers:
        - name: operator
          image: ghcr.io/krishiv/krishiv:dev
          imagePullPolicy: IfNotPresent
          command:
            - krishiv-operator
          args:
            - --namespace
            - $(KRISHIV_NAMESPACE)
            - --coordinator-id
            - $(KRISHIV_COORDINATOR_ID)
            - --bootstrap-executor-slots
            - "2"
            - --status-addr
            - 0.0.0.0:8080
            - --executor-grpc-addr
            - 0.0.0.0:9090
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          env:
            - name: KRISHIV_COORDINATOR_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KRISHIV_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
