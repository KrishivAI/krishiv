apiVersion: batch/v1
kind: Job
metadata:
  name: krishiv-benchmark
spec:
  template:
    spec:
      containers:
      - name: python
        image: ubuntu:24.04
        command: ["/bin/bash", "-c"]
        args:
        - |
          cd /krishiv
          source .venv/bin/activate
          python examples/python/benchmark_10_scenarios.py
      restartPolicy: Never
  backoffLimit: 0
