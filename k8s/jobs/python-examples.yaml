apiVersion: batch/v1
kind: Job
metadata:
  name: krishiv-sql-examples
spec:
  template:
    spec:
      containers:
      - name: python
        image: ubuntu:24.04
        command: ["/bin/bash", "-c"]
        args:
        - |
          cd /krishiv
          source .venv/bin/activate
          python examples/python/k8s_examples.py
        volumeMounts:
        - name: krishiv-repo
          mountPath: /krishiv
      volumes:
      - name: krishiv-repo
        hostPath:
          path: /home/code/krishiv
          type: Directory
      restartPolicy: Never
  backoffLimit: 0
