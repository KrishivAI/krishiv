[package]
name = "krishiv-common"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
sha2 = { workspace = true }
hex = { workspace = true }
arrow = { workspace = true }
tokio = { workspace = true, features = ["time"] }
tracing = { workspace = true }
thiserror = { workspace = true }

[features]
chaos = []

[dev-dependencies]
krishiv-checkpoint = { path = "../krishiv-checkpoint" }
krishiv-connectors = { path = "../krishiv-connectors" }
krishiv-proto = { path = "../krishiv-proto" }
krishiv-scheduler = { path = "../krishiv-scheduler" }
krishiv-governance = { path = "../krishiv-governance" }
krishiv-operator = { path = "../krishiv-operator" }
tokio = { workspace = true, features = ["rt-multi-thread", "time", "macros"] }

[[test]]
name = "chaos_suite"
path = "tests/chaos_suite.rs"
required-features = ["chaos"]

[lints]
workspace = true
