[package]
name = "krishiv-connectors"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[features]
kafka = ["dep:rdkafka"]
state = ["dep:krishiv-state"]

[dependencies]
arrow = { workspace = true }
parquet = { workspace = true }
bytes = { workspace = true }
thiserror = { workspace = true }
krishiv-common = { path = "../krishiv-common" }
krishiv-exec = { path = "../krishiv-exec" }
krishiv-lakehouse = { path = "../krishiv-lakehouse" }
krishiv-proto = { path = "../krishiv-proto" }
krishiv-state = { path = "../krishiv-state", optional = true }
object_store = { workspace = true }
rdkafka = { version = "0.36", optional = true, default-features = false, features = ["tokio"] }
regex = "1"
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
tracing = { workspace = true }



[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
proptest = "1"

[lints]
workspace = true
