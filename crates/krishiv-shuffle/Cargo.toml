[package]
name = "krishiv-shuffle"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description.workspace = true
readme = "README.md"

[lints]
workspace = true

[features]
jemalloc = ["dep:tikv-jemallocator"]

[dependencies]
tikv-jemallocator = { workspace = true, optional = true }
krishiv-common = { path = "../krishiv-common", version = "0.1.0" }
krishiv-metrics = { path = "../krishiv-metrics", version = "0.1.0" }
axum = { workspace = true }
dashmap = { workspace = true }
arrow = { workspace = true }
arrow-flight = { workspace = true }
bytes = { workspace = true }
object_store = { workspace = true, features = ["aws"] }
parquet = { workspace = true }
tokio = { workspace = true, features = ["fs", "net", "sync", "time"] }
tokio-stream = { workspace = true }
futures = { workspace = true }
tonic = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
blake3 = "1"
constant_time_eq = { workspace = true }
lz4_flex = { workspace = true }
ahash = { workspace = true }
indexmap = { workspace = true }
twox-hash = { workspace = true }
zstd = { workspace = true }
async-trait = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }

[[bin]]
name = "krishiv-shuffle-svc"
path = "src/bin/krishiv_shuffle_svc.rs"
