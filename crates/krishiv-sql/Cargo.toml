[package]
name = "krishiv-sql"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
arrow = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }
datafusion = { workspace = true }
krishiv-catalog = { path = "../krishiv-catalog" }
krishiv-lakehouse = { path = "../krishiv-lakehouse", features = ["delta"] }
krishiv-optimizer = { path = "../krishiv-optimizer" }
krishiv-plan = { path = "../krishiv-plan" }
krishiv-udf = { path = "../krishiv-udf" }
regex = "1"

[features]
default = ["delta"]
delta = ["krishiv-lakehouse/delta"]

[dev-dependencies]
tokio = { workspace = true }

[lib]
path = "src/lib.rs"

[lints]
workspace = true
