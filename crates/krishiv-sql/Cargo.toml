[package]
name = "krishiv-sql"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
arrow = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }
dashmap = { workspace = true }
thiserror = { workspace = true }
datafusion = { workspace = true }
krishiv-connectors = { path = "../krishiv-connectors", features = ["kafka", "iceberg", "s3"] }
krishiv-common = { path = "../krishiv-common" }
krishiv-plan = { path = "../krishiv-plan" }
regex = "1"
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sqlparser = "0.61"
tracing = { workspace = true }
url = "2"
uuid = { workspace = true }
futures.workspace = true
tokio.workspace = true
tokio-stream.workspace = true

[features]
default = ["iceberg"]
iceberg = ["krishiv-connectors/iceberg"]
delta = ["krishiv-connectors/delta"]
hudi = ["krishiv-connectors/hudi"]

[dev-dependencies]
tokio = { workspace = true }
wiremock = { workspace = true }

[lib]
path = "src/lib.rs"

[lints]
workspace = true
