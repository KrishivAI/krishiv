[package]
name = "krishiv-runtime"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
thiserror = { workspace = true }
krishiv-plan = { path = "../krishiv-plan" }
krishiv-dataflow = { path = "../krishiv-dataflow" }
krishiv-executor = { path = "../krishiv-executor" }
krishiv-scheduler = { path = "../krishiv-scheduler" }
krishiv-proto = { path = "../krishiv-proto" }
krishiv-common = { path = "../krishiv-common" }
krishiv-ivm = { path = "../krishiv-ivm" }
krishiv-sql = { path = "../krishiv-sql" }
dashmap = { workspace = true }
reqwest = { workspace = true }
arrow = { workspace = true }
arrow-flight = { workspace = true }
futures = { workspace = true }
tonic = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
base64 = { workspace = true }
parquet = { workspace = true }
webpki-root-certs = { workspace = true }
krishiv-connectors = { path = "../krishiv-connectors", features = ["vector-sinks"], optional = true }

[features]
kafka = []
vector-sinks = ["dep:krishiv-connectors"]

[dev-dependencies]
krishiv-flight-sql = { path = "../krishiv-flight-sql" }
tokio = { workspace = true }
tempfile = { workspace = true }

[lib]
path = "src/lib.rs"

[lints]
workspace = true
