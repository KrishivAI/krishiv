[package]
name = "krishiv-python"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
name = "krishiv_python"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[dependencies]
krishiv-api = { path = "../krishiv-api" }
krishiv-catalog = { path = "../krishiv-catalog" }
krishiv-common = { path = "../krishiv-common" }
krishiv-connectors = { path = "../krishiv-connectors", optional = true }
krishiv-exec = { path = "../krishiv-exec" }
krishiv-governance = { path = "../krishiv-governance" }
krishiv-lakehouse = { path = "../krishiv-lakehouse" }
krishiv-schema-registry = { path = "../krishiv-schema-registry" }
krishiv-sql = { path = "../krishiv-sql" }
krishiv-state = { path = "../krishiv-state" }
krishiv-ai = { path = "../krishiv-ai", optional = true }
krishiv-udf = { path = "../krishiv-udf" }
krishiv-vector-sinks = { path = "../krishiv-vector-sinks", optional = true }
krishiv-plan = { path = "../krishiv-plan" }
krishiv-runtime = { path = "../krishiv-runtime" }
arrow = { workspace = true }
parquet = { workspace = true }
pyo3 = { workspace = true }
pyo3-arrow = "0.17"
sha2 = { workspace = true }
tokio = { workspace = true }

[features]
default = []
kafka = ["dep:krishiv-connectors", "krishiv-connectors/kafka"]
iceberg = ["krishiv-lakehouse/iceberg"]
ai = ["dep:krishiv-ai", "dep:krishiv-vector-sinks", "krishiv-ai/fastembed-local"]
vector-sinks = ["ai"]
qdrant = ["dep:krishiv-vector-sinks", "krishiv-vector-sinks/qdrant"]
pgvector = ["dep:krishiv-vector-sinks", "krishiv-vector-sinks/pgvector"]

[lints]
workspace = true
