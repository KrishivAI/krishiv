[package]
name = "krishiv-python"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[lib]
name = "krishiv_python"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[dependencies]
krishiv-api = { path = "../krishiv-api", version = "0.1.0" }
krishiv-delta = { path = "../krishiv-delta", version = "0.1.0" }
krishiv-ivm = { path = "../krishiv-ivm", version = "0.1.0" }
krishiv-runtime = { path = "../krishiv-runtime", version = "0.1.0" }
krishiv-common = { path = "../krishiv-common", version = "0.1.0" }
krishiv-connectors = { path = "../krishiv-connectors", version = "0.1.0", features = ["kafka", "lakehouse", "schema-registry", "iceberg", "hudi", "vector-sinks"] }
krishiv-dataflow = { path = "../krishiv-dataflow", version = "0.1.0" }
krishiv-sql = { path = "../krishiv-sql", version = "0.1.0" }
krishiv-state = { path = "../krishiv-state", version = "0.1.0" }
krishiv-metrics = { path = "../krishiv-metrics", version = "0.1.0" }
krishiv-plan = { path = "../krishiv-plan", version = "0.1.0" }
arrow = { workspace = true }
parquet = { workspace = true }
pyo3 = { workspace = true }
# B-1 fix: turn `sql_async` into a real Python awaitable (not a blocking
# method dressed up as one). `pyo3-async-runtimes` bridges the Rust async runtime
# (tokio, the only one we ship) to Python's asyncio event loop.
pyo3-async-runtimes = { version = "0.29", features = ["tokio-runtime"] }
tokio = { workspace = true }
futures.workspace = true
jsonwebtoken.workspace = true
serde_json.workspace = true
constant_time_eq.workspace = true
serde = { workspace = true }
tracing = { workspace = true }

[features]
default = []
extension-module = ["pyo3/extension-module"]
kafka = ["krishiv-connectors/kafka", "krishiv-api/kafka"]
iceberg = ["krishiv-connectors/iceberg", "krishiv-api/iceberg-sink"]
# Cloud object-store backends (S3/MinIO, GCS, Azure) — required for Iceberg
# tables and other sinks whose `path` is an `s3://` URI.
cloud = ["krishiv-connectors/cloud"]
kinesis = ["krishiv-connectors/kinesis"]
pulsar = ["krishiv-connectors/pulsar-source"]
cassandra = ["krishiv-connectors/cassandra"]
elasticsearch = ["krishiv-connectors/elasticsearch"]
hbase = ["krishiv-connectors/hbase"]
ai = ["krishiv-connectors/vector-sinks"]
vector-sinks = ["ai", "krishiv-connectors/vector-sinks"]
qdrant = ["vector-sinks", "krishiv-connectors/qdrant"]
pgvector = ["vector-sinks", "krishiv-connectors/pgvector"]

[lints]
workspace = true
