[package]
name = "krishiv-python"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
name = "krishiv_python"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[dependencies]
krishiv-api = { path = "../krishiv-api" }
krishiv-catalog = { path = "../krishiv-catalog" }
krishiv-lakehouse = { path = "../krishiv-lakehouse" }
krishiv-schema-registry = { path = "../krishiv-schema-registry" }
krishiv-sql = { path = "../krishiv-sql" }
krishiv-ai = { path = "../krishiv-ai", features = ["fastembed-local"] }
krishiv-udf = { path = "../krishiv-udf" }
krishiv-vector-sinks = { path = "../krishiv-vector-sinks" }
arrow = { workspace = true }
pyo3 = { workspace = true }
tokio = { workspace = true }

[lints]
workspace = true
