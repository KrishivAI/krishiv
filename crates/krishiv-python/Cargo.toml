[package]
name = "krishiv-python"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[lib]
name = "krishiv_python"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[dependencies]
krishiv-api = { path = "../krishiv-api" }
krishiv-common = { path = "../krishiv-common" }
krishiv-connectors = { path = "../krishiv-connectors", features = ["kafka", "lakehouse", "schema-registry", "iceberg", "hudi", "vector-sinks"] }
krishiv-dataflow = { path = "../krishiv-dataflow" }
krishiv-sql = { path = "../krishiv-sql" }
krishiv-state = { path = "../krishiv-state" }
krishiv-ai = { path = "../krishiv-ai", optional = true }
krishiv-metrics = { path = "../krishiv-metrics" }
krishiv-plan = { path = "../krishiv-plan" }
arrow = { workspace = true }
parquet = { workspace = true }
pyo3 = { workspace = true }
pyo3-arrow = "0.17"
tokio = { workspace = true }
futures.workspace = true
jsonwebtoken.workspace = true
serde_json.workspace = true
constant_time_eq.workspace = true
serde = { workspace = true }

[features]
default = []
extension-module = ["pyo3/extension-module"]
kafka = ["krishiv-connectors/kafka", "krishiv-api/kafka"]
iceberg = ["krishiv-connectors/iceberg"]
kinesis = ["krishiv-connectors/kinesis"]
pulsar = ["krishiv-connectors/pulsar-source"]
ai = ["dep:krishiv-ai", "krishiv-ai/vector-sinks"]
vector-sinks = ["ai", "krishiv-ai/vector-sinks"]
qdrant = ["dep:krishiv-ai", "krishiv-ai/qdrant"]
pgvector = ["dep:krishiv-ai", "krishiv-ai/pgvector"]

[lints]
workspace = true
