[package]
name = "krishiv-python"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
name = "krishiv_python"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[dependencies]
krishiv-api = { path = "../krishiv-api" }
krishiv-common = { path = "../krishiv-common" }
krishiv-connectors = { path = "../krishiv-connectors", features = ["kafka", "lakehouse", "schema-registry", "iceberg", "hudi"] }
krishiv-dataflow = { path = "../krishiv-dataflow" }
krishiv-sql = { path = "../krishiv-sql" }
krishiv-state = { path = "../krishiv-state" }
krishiv-ai = { path = "../krishiv-ai", optional = true }
krishiv-plan = { path = "../krishiv-plan" }
krishiv-runtime = { path = "../krishiv-runtime" }
dashmap = { workspace = true }
arrow = { workspace = true }
parquet = { workspace = true }
pyo3 = { workspace = true }
pyo3-arrow = "0.17"
sha2 = { workspace = true }
tokio = { workspace = true }
futures.workspace = true

[features]
default = []
extension-module = ["pyo3/extension-module"]
kafka = ["krishiv-connectors/kafka"]
iceberg = ["krishiv-connectors/iceberg"]
ai = ["dep:krishiv-ai", "krishiv-ai/fastembed-local"]
vector-sinks = ["ai", "krishiv-ai/vector-sinks"]
qdrant = ["dep:krishiv-ai", "krishiv-ai/qdrant"]
pgvector = ["dep:krishiv-ai", "krishiv-ai/pgvector"]

[lints]
workspace = true
