[package]
name = "krishiv-python"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
name = "krishiv_python"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[features]
default = []
iceberg = ["dep:krishiv-lakehouse"]
kafka = []

[dependencies]
krishiv-api = { path = "../krishiv-api" }
krishiv-udf = { path = "../krishiv-udf" }
krishiv-state = { path = "../krishiv-state" }
krishiv-lakehouse = { path = "../krishiv-lakehouse", optional = true }
arrow = { workspace = true }
pyo3 = { workspace = true }
pyo3-arrow = "0.17"
tokio = { workspace = true }

[lints]
workspace = true
