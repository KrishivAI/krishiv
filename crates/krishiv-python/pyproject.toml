[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "krishiv"
version = "0.1.0"
description = "Krishiv — hybrid batch and streaming compute engine"
license = { text = "Apache-2.0" }
requires-python = ">=3.9"
keywords = ["sql", "streaming", "arrow", "datafusion", "compute"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Rust",
    "Topic :: Database",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Libraries",
]

[project.optional-dependencies]
# pip install krishiv[pandas]
pandas = ["pandas>=1.5"]
# pip install krishiv[pyarrow]
pyarrow = ["pyarrow>=14.0"]
# pip install krishiv[all]
all = ["pandas>=1.5", "pyarrow>=14.0"]

[tool.maturin]
# Makes the extension importable as `import krishiv` (not `import krishiv_python`)
module-name = "krishiv"
features = ["pyo3/extension-module"]
# Strip debug symbols in release builds to reduce wheel size
strip = true
# Target the Cargo.toml in this directory
manifest-path = "Cargo.toml"
