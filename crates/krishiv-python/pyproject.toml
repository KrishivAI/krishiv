[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "krishiv"
version = "0.1.0"
description = "Krishiv — hybrid batch and streaming compute engine"
readme = { file = "README.md", content-type = "text/markdown" }
license = { text = "Apache-2.0" }
requires-python = ">=3.9"
keywords = ["sql", "streaming", "arrow", "datafusion", "compute"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Rust",
    "Topic :: Database",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Libraries",
]

[project.optional-dependencies]
pandas = ["pandas>=1.5"]
pyarrow = ["pyarrow>=14.0"]
arrow = ["pyarrow>=14.0", "pandas>=1.5"]
kafka = []
iceberg = []
all = ["pandas>=1.5", "pyarrow>=14.0", "kafka", "iceberg"]

[tool.maturin]
module-name = "krishiv"
features = ["pyo3/extension-module"]
strip = true
manifest-path = "Cargo.toml"
python-source = "python"

# Map pip extras → Cargo features (maturin 1.7+)
