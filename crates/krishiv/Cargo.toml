[package]
name = "krishiv"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Krishiv — hybrid batch and streaming compute engine"
keywords = ["sql", "streaming", "arrow", "datafusion", "compute"]
categories = ["database", "data-structures"]

[lib]
path = "src/lib.rs"

[[bin]]
name = "krishiv"
path = "src/main.rs"

[features]
# Features gate OPTIONAL DEPENDENCY FAMILIES, not code paths.
# Execution mode (embedded / single-node / distributed) is always selected at
# runtime via SessionBuilder or KRISHIV_MODE env var — no recompile needed.
#
# What features DO control:
#   embedded    → no extra deps (baseline API surface, always compiles)
#   single-node → pulls in Flight SQL server, shuffle service, Redb metadata
#   distributed → pulls in Flight SQL server, shuffle service, etcd metadata
#   k8s         → distributed + Kubernetes operator CRD + reconciler
#
# Design intent: keep binary surface predictable. A `--features embedded` build
# still compiles all three runtime backends (EmbeddedBackend, SingleNodeBackend,
# DistributedBackend) but omits Flight SQL, shuffle, etcd, and operator deps that
# would never be activated in a pure in-process deployment.
default = ["local"]

# Build presets
local   = ["embedded", "single-node", "jemalloc", "rest-catalog", "iceberg"]
full    = ["single-node", "distributed", "k8s", "kafka", "iceberg", "cloud", "jemalloc", "jdbc"]
# `prod`: the deployed-cluster preset. Everything a distributed cluster needs to
# run real workloads — Kafka sources, Iceberg tables on object storage, the
# distributed control plane. `build-fast-engine.sh` builds THIS, not bare
# default, so shipped images never silently lack kafka/cloud.
prod    = ["distributed", "rest-catalog", "kafka", "iceberg", "cloud", "jemalloc", "jdbc"]

# Deployment capability surfaces (gate optional dep families)
embedded    = []                                                 # baseline; no optional deps
single-node = ["flight-sql", "shuffle"]                        # local daemon + RocksDB metadata
distributed = ["flight-sql", "shuffle", "etcd"]                 # remote cluster + etcd metadata
bare-metal  = ["distributed"]                                    # alias: process-managed cluster (run_bare_metal.sh, justfile)
k8s         = ["distributed", "dep:krishiv-operator", "krishiv-operator/k8s"]

# Optional dependency families
flight-sql = ["dep:krishiv-flight-sql"]
# Platform catalog bridge: the local daemon can attach an Iceberg REST
# catalog (KRISHIV_ICEBERG_REST_* env) so SQL resolves governed tables.
rest-catalog = ["flight-sql", "krishiv-flight-sql/rest-catalog"]
shuffle = ["dep:krishiv-shuffle"]
etcd = ["krishiv-scheduler/etcd"]
kafka = ["krishiv-connectors/kafka"]
# jdbc: Postgres pull source/sink (sqlx) + the `STORED AS JDBC` SQL factory
# with incremental keyset cursors — Phase 31 ingest breadth. In prod/full so
# shipped images can serve governed JDBC pulls.
jdbc = ["krishiv-connectors/jdbc", "krishiv-sql/jdbc"]
state = ["krishiv-connectors/state"]
# cloud: object-store backends (S3/GCS/Azure, MinIO-compatible) for Iceberg and
# other lakehouse I/O. Without this, `s3://`/object-store URIs fail at runtime —
# the gap that motivated the capability manifest. Propagates to the connectors
# object_store cloud features.
cloud = ["krishiv-connectors/cloud"]
# krishiv-sql no longer enables Iceberg by default, so the binary's iceberg
# preset must re-enable it on the SQL layer to keep full/k8s builds unchanged.
iceberg = ["krishiv-connectors/iceberg", "krishiv-sql/iceberg", "krishiv-executor/iceberg"]
delta = ["krishiv-connectors/delta"]
# jemalloc: replace the system allocator with jemalloc for lower contention and
# smaller RSS on multi-threaded workloads. Enabled in all non-minimal presets.
# Disable for WASM or environments where jemalloc fails to link.
jemalloc = ["dep:tikv-jemallocator"]

[dependencies]
tikv-jemallocator = { workspace = true, optional = true }
krishiv-common = { path = "../krishiv-common", version = "0.1.0" }
krishiv-api = { path = "../krishiv-api", version = "0.1.0" }
krishiv-plan = { path = "../krishiv-plan", version = "0.1.0" }
krishiv-state = { path = "../krishiv-state", version = "0.1.0" }
krishiv-connectors = { path = "../krishiv-connectors", version = "0.1.0", features = ["lakehouse"] }
krishiv-metrics = { path = "../krishiv-metrics", version = "0.1.0" }
krishiv-operator = { path = "../krishiv-operator", version = "0.1.0", optional = true, default-features = false }
krishiv-ui = { path = "../krishiv-ui", version = "0.1.0" }
krishiv-mcp = { path = "../krishiv-mcp", version = "0.1.0" }
krishiv-proto = { path = "../krishiv-proto", version = "0.1.0" }
krishiv-scheduler = { path = "../krishiv-scheduler", version = "0.1.0" }
krishiv-executor = { path = "../krishiv-executor", version = "0.1.0" }
krishiv-flight-sql = { path = "../krishiv-flight-sql", version = "0.1.0", optional = true }
krishiv-shuffle = { path = "../krishiv-shuffle", version = "0.1.0", optional = true }
krishiv-sql = { path = "../krishiv-sql", version = "0.1.0" }
arrow = { workspace = true }
axum = { workspace = true }
dotenvy = "0.15"
libc = "0.2"
tokio = { workspace = true }
tonic = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
parquet = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
arrow = { workspace = true }
krishiv-runtime = { path = "../krishiv-runtime", version = "0.1.0" }
krishiv-plan = { path = "../krishiv-plan", version = "0.1.0" }
parquet = { workspace = true }
tempfile = { workspace = true }
