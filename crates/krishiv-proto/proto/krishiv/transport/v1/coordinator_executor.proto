syntax = "proto3";

package krishiv.transport.v1;

service CoordinatorExecutor {
  rpc RegisterExecutor(RegisterExecutorRequest) returns (RegisterExecutorResponse);
  rpc DeregisterExecutor(DeregisterExecutorRequest) returns (DeregisterExecutorResponse);
  rpc ExecutorHeartbeat(ExecutorHeartbeatRequest) returns (ExecutorHeartbeatResponse);
  rpc TaskStatus(TaskStatusRequest) returns (TaskStatusResponse);
  rpc CheckpointAck(CheckpointAckRequest) returns (CheckpointAckResponse);
}

service ExecutorTask {
  rpc AssignTask(ExecutorTaskAssignment) returns (TaskStatusResponse);
  rpc CancelTask(TaskCancellationRequest) returns (TaskStatusResponse);
}

// Management API for CLI-to-coordinator operations (GAP-RT-04).
service CoordinatorManagement {
  rpc TriggerSavepoint(TriggerSavepointRequest) returns (TriggerSavepointResponse);
  rpc RestoreJob(RestoreJobRequest) returns (RestoreJobResponse);
  rpc ListCheckpoints(ListCheckpointsRequest) returns (ListCheckpointsResponse);
  rpc InspectState(InspectStateRequest) returns (InspectStateResponse);
}

message TransportVersion {
  uint32 major = 1;
  uint32 minor = 2;
}

message ExecutorDescriptor {
  string executor_id = 1;
  string host = 2;
  uint64 slots = 3;
  string task_endpoint = 4;
}

message RegisterExecutorRequest {
  TransportVersion version = 1;
  ExecutorDescriptor descriptor = 2;
}

message RegisterExecutorResponse {
  TransportVersion version = 1;
  string executor_id = 2;
  uint64 lease_generation = 3;
  TransportDisposition disposition = 4;
  string message = 5;
}

message DeregisterExecutorRequest {
  TransportVersion version = 1;
  string executor_id = 2;
  uint64 lease_generation = 3;
  string reason = 4;
}

message DeregisterExecutorResponse {
  TransportVersion version = 1;
  string executor_id = 2;
  uint64 lease_generation = 3;
  TransportDisposition disposition = 4;
  string message = 5;
}

message TaskAttemptRef {
  string job_id = 1;
  string stage_id = 2;
  string task_id = 3;
  uint32 attempt_id = 4;
}

message ExecutorHeartbeatRequest {
  TransportVersion version = 1;
  string executor_id = 2;
  uint64 lease_generation = 3;
  ExecutorState state = 4;
  repeated TaskAttemptRef running_attempts = 5;
  // Per-executor resource telemetry (P0.17).
  uint64 memory_used_bytes = 6;
  uint64 memory_limit_bytes = 7;
  uint32 active_task_count = 8;
  // Per-executor network and CPU resource usage (P0.17).
  double cpu_cores_used = 9;
  uint64 network_bytes_sent = 10;
  uint64 network_bytes_recv = 11;
}

message ExecutorHeartbeatResponse {
  TransportVersion version = 1;
  uint64 lease_generation = 2;
  TransportDisposition disposition = 3;
  string message = 4;
}

message ExecutorTaskAssignment {
  TransportVersion version = 1;
  string job_id = 2;
  string stage_id = 3;
  string task_id = 4;
  uint32 attempt_id = 5;
  string executor_id = 6;
  uint64 lease_generation = 7;
  repeated InputPartition input_partitions = 8;
  PlanFragment plan_fragment = 9;
  OutputContract output_contract = 10;
  uint64 task_timeout_secs = 11;
}

message InputPartition {
  string partition_id = 1;
  string description = 2;
  InputPartitionDescriptor descriptor = 3;
}

message InputPartitionDescriptor {
  InputPartitionDescriptorKind kind = 1;
  string table_name = 2;
  string path = 3;
  string object_base_dir = 4;
  string object_path = 5;
  string kafka_topic = 6;
  int32 kafka_partition = 7;
  int64 kafka_start_offset = 8;
  repeated MemoryKafkaRecord memory_kafka_records = 9;
  // ShuffleFlight fields.
  string shuffle_flight_endpoint = 10;
  string shuffle_job_id = 11;
  string shuffle_upstream_stage_id = 12;
  uint32 shuffle_partition_id = 13;
}

message MemoryKafkaRecord {
  int64 id = 1;
  string value = 2;
}

message PlanFragment {
  string description = 1;
}

message OutputContract {
  OutputContractKind kind = 1;
  string description = 2;
  OutputContractDescriptor descriptor = 3;
}

message OutputContractDescriptor {
  OutputContractDescriptorKind kind = 1;
  string path = 2;
  string object_base_dir = 3;
  string object_path = 4;
  string shuffle_partition = 5;
}

message TaskStatusRequest {
  TransportVersion version = 1;
  string job_id = 2;
  string stage_id = 3;
  string task_id = 4;
  uint32 attempt_id = 5;
  string executor_id = 6;
  uint64 lease_generation = 7;
  TaskState state = 8;
  string message = 9;
  TaskOutputMetadata output_metadata = 10;
}

message TaskOutputMetadata {
  string output_kind = 1;
  uint64 row_count = 2;
  uint64 batch_count = 3;
  uint64 column_count = 4;
  // Shuffle partition outputs: parallel arrays (partition_id, size_bytes, flight_endpoint).
  repeated uint32 shuffle_partition_ids = 5;
  repeated uint64 shuffle_partition_bytes = 6;
  repeated string shuffle_flight_endpoints = 7;
  // Runtime stats for AQE.
  uint64 input_rows = 8;
  uint64 output_rows = 9;
  uint64 cpu_nanos = 10;
  uint64 spill_bytes = 11;
}

message TaskCancellationRequest {
  TransportVersion version = 1;
  string job_id = 2;
  string stage_id = 3;
  string task_id = 4;
  uint32 attempt_id = 5;
  string reason = 6;
}

message TaskStatusResponse {
  TransportVersion version = 1;
  TransportDisposition disposition = 2;
  string message = 3;
}

enum ExecutorState {
  EXECUTOR_STATE_UNSPECIFIED = 0;
  EXECUTOR_STATE_REGISTERED = 1;
  EXECUTOR_STATE_HEALTHY = 2;
  EXECUTOR_STATE_LOST = 3;
  EXECUTOR_STATE_DRAINING = 4;
  EXECUTOR_STATE_REMOVED = 5;
}

enum TaskState {
  TASK_STATE_UNSPECIFIED = 0;
  TASK_STATE_PENDING = 1;
  TASK_STATE_ASSIGNED = 2;
  TASK_STATE_RUNNING = 3;
  TASK_STATE_SUCCEEDED = 4;
  TASK_STATE_FAILED = 5;
  TASK_STATE_RETRYING = 6;
  TASK_STATE_CANCELLED = 7;
}

enum InputPartitionDescriptorKind {
  INPUT_PARTITION_DESCRIPTOR_KIND_UNSPECIFIED = 0;
  INPUT_PARTITION_DESCRIPTOR_KIND_LOCAL_PARQUET = 1;
  INPUT_PARTITION_DESCRIPTOR_KIND_CONNECTOR_PARQUET = 2;
  INPUT_PARTITION_DESCRIPTOR_KIND_OBJECT_PARQUET = 3;
  INPUT_PARTITION_DESCRIPTOR_KIND_MEMORY_KAFKA = 4;
  // Arrow Flight endpoint for reading upstream shuffle output.
  INPUT_PARTITION_DESCRIPTOR_KIND_SHUFFLE_FLIGHT = 5;
}

enum OutputContractDescriptorKind {
  OUTPUT_CONTRACT_DESCRIPTOR_KIND_UNSPECIFIED = 0;
  OUTPUT_CONTRACT_DESCRIPTOR_KIND_INLINE_RECORD_BATCHES = 1;
  OUTPUT_CONTRACT_DESCRIPTOR_KIND_LOCAL_FILE = 2;
  OUTPUT_CONTRACT_DESCRIPTOR_KIND_SHUFFLE = 3;
  OUTPUT_CONTRACT_DESCRIPTOR_KIND_OBJECT_PARQUET_SINK = 4;
  OUTPUT_CONTRACT_DESCRIPTOR_KIND_PARQUET_SINK = 5;
}

enum OutputContractKind {
  OUTPUT_CONTRACT_KIND_UNSPECIFIED = 0;
  OUTPUT_CONTRACT_KIND_INLINE_RECORD_BATCHES = 1;
  OUTPUT_CONTRACT_KIND_LOCAL_FILE = 2;
  OUTPUT_CONTRACT_KIND_SHUFFLE = 3;
  OUTPUT_CONTRACT_KIND_SINK = 4;
}

message CheckpointSourceOffset {
  string partition_id = 1;
  int64 offset = 2;
}

message CheckpointAckRequest {
  string job_id = 1;
  string operator_id = 2;
  string task_id = 3;
  uint64 epoch = 4;
  uint64 fencing_token = 5;
  repeated CheckpointSourceOffset source_offsets = 6;
  string snapshot_path = 7;
}

message CheckpointAckResponse {
  oneof result {
    CheckpointAckAccepted accepted = 1;
    CheckpointAckStaleEpoch stale_epoch = 2;
    CheckpointAckJobNotFound job_not_found = 3;
  }
}

message CheckpointAckAccepted {}

message CheckpointAckStaleEpoch {
  uint64 current_epoch = 1;
}

message CheckpointAckJobNotFound {}

// ── CoordinatorManagement messages ──────────────────────────────────────────

message TriggerSavepointRequest {
  string job_id = 1;
  string label = 2;
}

message TriggerSavepointResponse {
  uint64 epoch = 1;
  string message = 2;
}

message RestoreJobRequest {
  string job_id = 1;
  uint64 epoch = 2;
  string storage_path = 3;
}

message RestoreJobResponse {
  bool accepted = 1;
  string message = 2;
}

message ListCheckpointsRequest {
  string job_id = 1;
}

message CheckpointEpochInfo {
  uint64 epoch = 1;
  bool is_savepoint = 2;
  string savepoint_label = 3;
}

message ListCheckpointsResponse {
  repeated CheckpointEpochInfo epochs = 1;
}

message InspectStateRequest {
  string job_id = 1;
  string operator_id = 2;
}

message StateSnapshotInfo {
  string task_id = 1;
  string snapshot_path = 2;
}

message InspectStateResponse {
  repeated StateSnapshotInfo snapshots = 1;
}

enum TransportDisposition {
  TRANSPORT_DISPOSITION_UNSPECIFIED = 0;
  TRANSPORT_DISPOSITION_ACCEPTED = 1;
  TRANSPORT_DISPOSITION_REJECTED = 2;
  TRANSPORT_DISPOSITION_DUPLICATE = 3;
  TRANSPORT_DISPOSITION_STALE_ATTEMPT = 4;
  TRANSPORT_DISPOSITION_STALE_LEASE = 5;
  TRANSPORT_DISPOSITION_UNKNOWN_JOB = 6;
  TRANSPORT_DISPOSITION_UNKNOWN_TASK = 7;
  TRANSPORT_DISPOSITION_UNKNOWN_EXECUTOR = 8;
}

// R17: LLM UDF quota reporting and coordinator throttling.
message LlmQuotaReport {
  string model = 1;
  uint64 requests_used = 2;
  uint64 tokens_used = 3;
  uint64 period_ms = 4;
}

message LlmThrottleCommand {
  string model = 1;
  uint32 max_requests_per_minute = 2;
  uint64 max_tokens_per_minute = 3;
}
