[package]
name = "krishiv-scheduler"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[features]
etcd = ["dep:etcd-client"]
redb = ["dep:redb"]

[dependencies]
krishiv-common = { path = "../krishiv-common" }
arrow = { workspace = true }
axum = { workspace = true }
base64 = "0.22"
futures = { workspace = true }
krishiv-state = { path = "../krishiv-state" }
krishiv-metrics = { path = "../krishiv-metrics" }
krishiv-plan = { path = "../krishiv-plan" }
krishiv-proto = { path = "../krishiv-proto" }
krishiv-shuffle = { path = "../krishiv-shuffle" }
redb = { workspace = true, optional = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["net", "time", "sync", "signal"] }
tokio-stream.workspace = true
tokio-util = { version = "0.7", features = ["rt"] }
tonic.workspace = true
tower = { workspace = true }
tracing.workspace = true
async-trait.workspace = true
dashmap = { workspace = true }
indexmap = { workspace = true }
etcd-client = { version = "0.14", optional = true }
thiserror = { workspace = true }

[dev-dependencies]
arrow = { workspace = true }
krishiv-connectors = { path = "../krishiv-connectors" }
tempfile = { workspace = true }

[lib]
path = "src/lib.rs"

[[bin]]
name = "krishiv-coordinator"
path = "src/bin/krishiv_coordinator.rs"

[[bin]]
name = "krishiv-clusterd"
path = "src/bin/krishiv_clusterd.rs"
required-features = ["etcd"]

[[bin]]
name = "krishiv-job-coordinator"
path = "src/bin/krishiv_job_coordinator.rs"

[lints]
workspace = true
