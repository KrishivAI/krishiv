[package]
name = "krishiv-scheduler"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[features]
sqlite = ["dep:rusqlite"]
etcd = ["dep:etcd-client"]

[dependencies]
arrow = { workspace = true }
axum = { workspace = true }
futures = { workspace = true }
krishiv-async-util = { path = "../krishiv-async-util" }
krishiv-checkpoint = { path = "../krishiv-checkpoint" }
krishiv-governance = { path = "../krishiv-governance" }
krishiv-metrics = { path = "../krishiv-metrics" }
krishiv-plan = { path = "../krishiv-plan" }
krishiv-proto = { path = "../krishiv-proto" }
krishiv-shuffle = { path = "../krishiv-shuffle" }
reqwest = { workspace = true }
rusqlite = { version = "0.31", optional = true, features = ["bundled"] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["net", "time", "sync"] }
tokio-stream.workspace = true
tokio-util = { version = "0.7", features = ["rt"] }
tonic.workspace = true
tracing.workspace = true
async-trait.workspace = true
dashmap = { workspace = true }
etcd-client = { version = "0.14", optional = true }
thiserror = "1"

[dev-dependencies]
arrow = { workspace = true }
krishiv-connectors = { path = "../krishiv-connectors" }
tempfile = { workspace = true }

[lib]
path = "src/lib.rs"

[[bin]]
name = "krishiv-coordinator"
path = "src/bin/krishiv_coordinator.rs"

[[bin]]
name = "krishiv-clusterd"
path = "src/bin/krishiv_clusterd.rs"
required-features = ["etcd"]

[[bin]]
name = "krishiv-job-coordinator"
path = "src/bin/krishiv_job_coordinator.rs"

[lints]
workspace = true
