# cargo deny configuration — https://embarkstudios.github.io/cargo-deny/
# Run locally: cargo deny check
# CI: EmbarkStudios/cargo-deny-action runs this automatically.

# ── Licenses ─────────────────────────────────────────────────────────────────
[licenses]
# Allowlist of SPDX identifiers we accept.  Anything else fails the check.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    # 0BSD: used by enum-iterator (transitive from qdrant-client)
    "0BSD",
    # CDLA-Permissive-2.0: used by webpki-root-certs / webpki-roots
    "CDLA-Permissive-2.0",
    # bzip2-1.0.6: used by libbz2-rs-sys (transitive from parquet compression)
    "bzip2-1.0.6",
]
# Minimum confidence for license text detection (0.0–1.0).
confidence-threshold = 0.8

# ── Banned / duplicate crates ─────────────────────────────────────────────────
[bans]
# Warn (not deny) on duplicate versions — large workspaces commonly carry a few.
# Tighten to "deny" once the workspace is clean.
multiple-versions = "warn"
# Warn on wildcard version requirements. Path-only workspace deps lack a
# version specifier; tighten to "deny" once crates.io publication is set up
# with `dep = { path = "..", version = "x.y.z" }` for all intra-workspace deps.
wildcards = "warn"
# Crates that must never appear in the dependency tree.
deny = [
    # openssl-sys pulls in the system OpenSSL; we use rustls everywhere.
    { name = "openssl-sys" },
    # Banned in favour of sha2 / ring (already in our dep tree).
    { name = "md5" },
]
# Allowed exceptions for banned-by-policy but unavoidable transitive deps.
skip = [
    # md-5 is pulled in by iceberg-datafusion → datafusion-functions as a
    # non-cryptographic checksum utility; no direct use of MD5 by this project.
    { name = "md-5" },
]

# ── Advisory database (RustSec) ───────────────────────────────────────────────
# cargo-deny checks the advisory DB in addition to cargo-audit in CI.
# Use `cargo deny check advisories` to test locally.
[advisories]
# Ignore specific advisory IDs only after reviewing them.
ignore = [
    # RUSTSEC-2023-0071: Marvin Attack on `rsa` crate — no patch available.
    # `rsa` is pulled in by aws-sdk-kinesis (optional `kinesis` feature only).
    # We don't expose RSA operations to external callers.
    { id = "RUSTSEC-2023-0071" },
    # RUSTSEC-2024-0436: paste crate unmaintained.
    # Transitive dep; replaced when qdrant-client upgrades.
    { id = "RUSTSEC-2024-0436" },
    # RUSTSEC-2025-0052: async-std discontinued. Transitive dep; will drop when
    # its parent migrates to smol/tokio.
    { id = "RUSTSEC-2025-0052" },
    # RUSTSEC-2025-0134: rustls-pemfile unmaintained. Transitive dep.
    { id = "RUSTSEC-2025-0134" },
    # RUSTSEC-2026-0190: anyhow::Error::downcast_mut unsoundness.
    # Fixed in anyhow >= 1.0.103; upgrade once deps support it.
    { id = "RUSTSEC-2026-0190" },
    # RUSTSEC-2026-0104/0099/0098: rustls-webpki 0.101.7 advisories.
    # Brought in by aws-smithy-http-client via the optional `kinesis` feature.
    # aws-sdk-kinesis 1.x pins rustls 0.21; upgrade tracked in deps backlog.
    { id = "RUSTSEC-2026-0104" },
    { id = "RUSTSEC-2026-0099" },
    { id = "RUSTSEC-2026-0098" },
]

# ── Allowed crate sources ─────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
