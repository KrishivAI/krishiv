[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "krishiv-airflow"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = []

[tool.setuptools.packages.find]
where = ["."]
include = ["krishiv_airflow*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
