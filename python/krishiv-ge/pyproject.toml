[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "krishiv-ge"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = ["pyarrow>=15.0"]

[tool.setuptools.packages.find]
where = ["."]
include = ["krishiv_ge*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
