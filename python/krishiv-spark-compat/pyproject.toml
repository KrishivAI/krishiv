[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "krishiv-spark-compat"
version = "0.1.0"
description = "PySpark-compatible SparkSession shim for Krishiv"
requires-python = ">=3.10"
dependencies = [
    "grpcio>=1.60",
    "protobuf>=4.25",
    "pyarrow>=15.0",
]

[project.optional-dependencies]
pandas = ["pandas>=2.0"]

[tool.setuptools.packages.find]
where = ["."]
include = ["krishiv*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
