<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">Krishiv banner</title>
  <desc id="desc">Krishiv — a Rust-native hybrid compute framework for batch SQL, streaming pipelines, and incremental view maintenance.</desc>

  <defs>
    <linearGradient id="bn-frame" x1="20" y1="20" x2="280" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFB52A"/>
      <stop offset="0.55" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#B86A00"/>
    </linearGradient>
    <linearGradient id="bn-stroke" x1="40" y1="24" x2="120" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFB52A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="bn-spine" x1="50" y1="24" x2="62" y2="136" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFCB47"/>
      <stop offset="1" stop-color="#D07A00"/>
    </linearGradient>
    <linearGradient id="bn-word" x1="320" y1="100" x2="780" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5F5F5"/>
      <stop offset="1" stop-color="#FFD18A"/>
    </linearGradient>
    <radialGradient id="bn-glow" cx="180" cy="180" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.10"/>
      <stop offset="0.55" stop-color="#F59E0B" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bn-surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101010"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="bn-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#151515"/>
      <stop offset="1" stop-color="#0c0c0c"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" rx="24" fill="url(#bn-surface)"/>
  <rect width="1280" height="360" rx="24" fill="url(#bn-glow)"/>
  <rect x="0.75" y="0.75" width="1278.5" height="358.5" rx="23.25" fill="none" stroke="#2A2A2A" stroke-width="1.5"/>

