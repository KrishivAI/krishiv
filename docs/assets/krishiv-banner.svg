  <!-- ===== Left: the K mark (200x200 tile centered in 280 column) ===== -->
  <g transform="translate(40 80)">
    <rect x="6" y="6" width="188" height="188" rx="42" fill="#101010"/>
    <rect x="6.5" y="6.5" width="187" height="187" rx="41.5" fill="none" stroke="url(#bn-frame)" stroke-width="2" stroke-opacity="0.7"/>

    <rect x="64" y="32" width="30" height="136" rx="6" fill="url(#bn-spine)"/>
    <rect x="68" y="42" width="22" height="28" rx="4" fill="#101010" fill-opacity="0.7"/>
    <rect x="68" y="86" width="22" height="28" rx="4" fill="#101010" fill-opacity="0.7"/>
    <rect x="68" y="130" width="22" height="28" rx="4" fill="#101010" fill-opacity="0.7"/>

    <path d="M94 100L158 36" fill="none" stroke="url(#bn-stroke)" stroke-width="22" stroke-linecap="round"/>
    <path d="M94 100L164 164" fill="none" stroke="url(#bn-stroke)" stroke-width="22" stroke-linecap="round"/>

    <circle cx="158" cy="36" r="10" fill="#FFB52A"/>
    <circle cx="164" cy="164" r="10" fill="#F59E0B"/>
    <circle cx="79" cy="100" r="8" fill="#FFCB47"/>

    <path d="M22 56h22M22 100h22M22 144h22" fill="none" stroke="#F59E0B" stroke-width="4" stroke-linecap="round" stroke-opacity="0.55"/>
  </g>

  <!-- ===== Middle: wordmark + tagline + mode chips (column 280..880) ===== -->
  <g>
    <text x="280" y="120" fill="url(#bn-word)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="76" font-weight="800" letter-spacing="-2.5">Krishiv</text>
    <text x="284" y="158" fill="#D4D4D4" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="600" letter-spacing="-0.2">Rust-native compute for batch SQL, streaming &amp; IVM</text>

    <g transform="translate(284 196)">
      <!-- Batch SQL chip -->
      <g>
        <rect x="0" y="0" width="190" height="42" rx="21" fill="url(#bn-card)" stroke="#2A2A2A"/>
        <circle cx="22" cy="21" r="5" fill="#F59E0B"/>
        <text x="38" y="27" fill="#F5F5F5" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600">Batch SQL</text>
        <line x1="118" y1="11" x2="118" y2="31" stroke="#2A2A2A" stroke-width="1"/>
        <text x="128" y="26" fill="#A3A3A3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="500">DataFusion</text>
      </g>
      <!-- Streaming chip -->
      <g transform="translate(202 0)">
        <rect x="0" y="0" width="190" height="42" rx="21" fill="url(#bn-card)" stroke="#2A2A2A"/>
        <circle cx="22" cy="21" r="5" fill="#FFB52A"/>
        <text x="38" y="27" fill="#F5F5F5" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600">Streaming</text>
        <line x1="120" y1="11" x2="120" y2="31" stroke="#2A2A2A" stroke-width="1"/>
        <text x="130" y="26" fill="#A3A3A3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="500">Arrow · Tokio</text>
      </g>
      <!-- IVM chip -->
      <g transform="translate(404 0)">
        <rect x="0" y="0" width="190" height="42" rx="21" fill="url(#bn-card)" stroke="#2A2A2A"/>
        <circle cx="22" cy="21" r="5" fill="#FFCB47"/>
        <text x="38" y="27" fill="#F5F5F5" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600">IVM</text>
        <line x1="74" y1="11" x2="74" y2="31" stroke="#2A2A2A" stroke-width="1"/>
        <text x="84" y="26" fill="#A3A3A3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="500">DeltaBatch · Z-set</text>
      </g>
    </g>
  </g>

  <!-- ===== Right: deployment topology preview (column 900..1240) ===== -->
  <g transform="translate(910 80)">
    <text x="0" y="0" fill="#A3A3A3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">DEPLOYMENT</text>

    <!-- Embedded -->
    <g transform="translate(0 16)">
      <rect x="0" y="0" width="330" height="60" rx="10" fill="url(#bn-card)" stroke="#2A2A2A"/>
      <rect x="10" y="11" width="38" height="38" rx="8" fill="#101010" stroke="#3A3A3A"/>
      <text x="29" y="35" text-anchor="middle" fill="#F59E0B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800">K</text>
      <text x="60" y="28" fill="#F5F5F5" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">Embedded</text>
      <text x="60" y="46" fill="#A3A3A3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500">in-process · no daemon</text>
      <circle cx="310" cy="30" r="4" fill="#F59E0B"/>
    </g>

    <!-- Single-node -->
    <g transform="translate(0 88)">
      <rect x="0" y="0" width="330" height="60" rx="10" fill="url(#bn-card)" stroke="#2A2A2A"/>
      <rect x="10" y="11" width="38" height="38" rx="8" fill="#101010" stroke="#3A3A3A"/>
      <text x="29" y="35" text-anchor="middle" fill="#F59E0B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800">K</text>
      <text x="60" y="28" fill="#F5F5F5" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">Single-node</text>
      <text x="60" y="46" fill="#A3A3A3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500">local daemon · durable state</text>
      <circle cx="310" cy="30" r="4" fill="#FFB52A"/>
    </g>

    <!-- Distributed -->
    <g transform="translate(0 160)">
      <rect x="0" y="0" width="330" height="60" rx="10" fill="url(#bn-card)" stroke="#F59E0B" stroke-opacity="0.6"/>
      <rect x="10" y="11" width="38" height="38" rx="8" fill="#101010" stroke="#F59E0B" stroke-opacity="0.6"/>
      <text x="29" y="35" text-anchor="middle" fill="#FFB52A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800">K</text>
      <rect x="58" y="20" width="12" height="22" rx="2" fill="#1A1A1A" stroke="#3A3A3A"/>
      <rect x="74" y="20" width="12" height="22" rx="2" fill="#1A1A1A" stroke="#3A3A3A"/>
      <rect x="90" y="20" width="12" height="22" rx="2" fill="#1A1A1A" stroke="#3A3A3A"/>
      <text x="116" y="28" fill="#F5F5F5" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">Distributed</text>
      <text x="116" y="46" fill="#A3A3A3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500">coordinator + N executors</text>
      <text x="278" y="35" fill="#FFB52A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="0.6">PREVIEW</text>
    </g>
  </g>

  <!-- ===== Bottom: layer bar (full width, single row) ===== -->
  <g transform="translate(280 320)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600">
    <line x1="0" y1="0" x2="950" y2="0" stroke="#2A2A2A" stroke-width="1"/>
    <g transform="translate(0 18)">
      <g>
        <circle cx="6" cy="6" r="3.5" fill="#F59E0B"/>
        <text x="18" y="10" fill="#D4D4D4">Apache Arrow</text>
      </g>
      <g transform="translate(130 0)">
        <circle cx="6" cy="6" r="3.5" fill="#F59E0B"/>
        <text x="18" y="10" fill="#D4D4D4">DataFusion</text>
      </g>
      <g transform="translate(250 0)">
        <circle cx="6" cy="6" r="3.5" fill="#F59E0B"/>
        <text x="18" y="10" fill="#D4D4D4">Tokio</text>
      </g>
      <g transform="translate(330 0)">
        <circle cx="6" cy="6" r="3.5" fill="#F59E0B"/>
        <text x="18" y="10" fill="#D4D4D4">RocksDB</text>
