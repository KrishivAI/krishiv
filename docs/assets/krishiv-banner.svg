    <circle cx="30" cy="130" r="0.7"/><circle cx="82" cy="130" r="0.7"/><circle cx="134" cy="130" r="0.7"/><circle cx="186" cy="130" r="0.7"/><circle cx="238" cy="130" r="0.7"/><circle cx="290" cy="130" r="0.7"/><circle cx="342" cy="130" r="0.7"/><circle cx="394" cy="130" r="0.7"/><circle cx="446" cy="130" r="0.7"/><circle cx="498" cy="130" r="0.7"/><circle cx="550" cy="130" r="0.7"/><circle cx="602" cy="130" r="0.7"/><circle cx="654" cy="130" r="0.7"/><circle cx="706" cy="130" r="0.7"/><circle cx="758" cy="130" r="0.7"/><circle cx="810" cy="130" r="0.7"/><circle cx="862" cy="130" r="0.7"/><circle cx="914" cy="130" r="0.7"/><circle cx="966" cy="130" r="0.7"/><circle cx="1018" cy="130" r="0.7"/><circle cx="1070" cy="130" r="0.7"/><circle cx="1122" cy="130" r="0.7"/><circle cx="1174" cy="130" r="0.7"/><circle cx="1226" cy="130" r="0.7"/>
    <circle cx="30" cy="180" r="0.7"/><circle cx="82" cy="180" r="0.7"/><circle cx="134" cy="180" r="0.7"/><circle cx="186" cy="180" r="0.7"/><circle cx="238" cy="180" r="0.7"/><circle cx="290" cy="180" r="0.7"/><circle cx="342" cy="180" r="0.7"/><circle cx="394" cy="180" r="0.7"/><circle cx="446" cy="180" r="0.7"/><circle cx="498" cy="180" r="0.7"/><circle cx="550" cy="180" r="0.7"/><circle cx="602" cy="180" r="0.7"/><circle cx="654" cy="180" r="0.7"/><circle cx="706" cy="180" r="0.7"/><circle cx="758" cy="180" r="0.7"/><circle cx="810" cy="180" r="0.7"/><circle cx="862" cy="180" r="0.7"/><circle cx="914" cy="180" r="0.7"/><circle cx="966" cy="180" r="0.7"/><circle cx="1018" cy="180" r="0.7"/><circle cx="1070" cy="180" r="0.7"/><circle cx="1122" cy="180" r="0.7"/><circle cx="1174" cy="180" r="0.7"/><circle cx="1226" cy="180" r="0.7"/>
