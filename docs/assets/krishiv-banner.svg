      <g transform="translate(420 0)">
        <circle cx="6" cy="6" r="3.5" fill="#F59E0B"/>
        <text x="18" y="10" fill="#D4D4D4">Iceberg · Parquet · Kafka</text>
      </g>
      <g transform="translate(660 0)">
        <circle cx="6" cy="6" r="3.5" fill="#F59E0B"/>
        <text x="18" y="10" fill="#D4D4D4">Rust · no JVM</text>
      </g>
