name: Rust Setup
description: >
  Install Rust toolchain (reads rust-toolchain.toml), restore Swatinem build
  cache, and install Linux system dependencies needed by native crates.
inputs:
  components:
    description: Comma-separated rustup components (e.g. "rustfmt,clippy")
    required: false
    default: ""
  cache-key:
    description: Extra Swatinem/rust-cache key suffix
    required: false
    default: ""
  extra-apt:
    description: Space-separated extra apt packages beyond the baseline set
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.components }}
    - uses: Swatinem/rust-cache@v2
      with:
        key: ${{ inputs.cache-key }}
    - name: Install system deps
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          libssl-dev pkg-config cmake mold clang libclang-dev sccache ${{ inputs.extra-apt }}
