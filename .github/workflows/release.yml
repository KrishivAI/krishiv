name: Release

# Triggered when a GitHub Release is published (via UI or gh CLI).
# Workflow:
#   1. just release 0.2.0   (bumps version, commits, tags, pushes)
#   2. GitHub → Releases → Draft a new release → select tag → set notes / pre-release flag
#   3. Click Publish → this workflow fires, builds all artifacts, uploads to the release
on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/krishiv
  CXXFLAGS: "-include cstdint"
  RUSTC_WRAPPER: sccache

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ── 1. Validate release readiness ───────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Extract version metadata
        id: meta
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          IS_PRE="${{ github.event.release.prerelease }}"
          echo "version=${VERSION}"      >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRE}" >> "$GITHUB_OUTPUT"
          echo "Tag=${TAG}  Version=${VERSION}  PreRelease=${IS_PRE}"
      - name: Validate tag and project metadata
        run: python3 scripts/check_release.py --tag "${{ github.event.release.tag_name }}"
      - name: Validate API parity manifest
        run: python3 scripts/check_parity_manifest.py
      - name: Validate migration notes (stable only)
        if: github.event.release.prerelease == false
        run: python3 scripts/check_migration_notes.py

  # ── 2a. Cargo binaries ──────────────────────────────────────────────────────
  # Publishes two tarballs per platform:
  #   krishiv-{version}-{target}.tar.gz           — full feature set (k8s + all connectors)
  #   krishiv-{version}-{target}-single-node.tar.gz — embedded only (no distributed deps)
  #
  # The full archive includes all cluster daemon binaries so bare-metal operators
  # can distribute individual binaries across coordinator/executor/shuffle hosts
  # without pulling the container image.
  build-binary:
    name: Binary (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            extra_sys_deps: musl-tools
          - target: aarch64-apple-darwin
            runner: macos-14
            extra_sys_deps: ""
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          cache-key: binary-${{ matrix.target }}
          extra-apt: ${{ matrix.extra_sys_deps }}
      - name: Add target
        run: rustup target add ${{ matrix.target }}

      # Full build: all cluster daemons + connectors (k8s feature set)
      - name: Build (full — all daemons)
        run: |
          cargo build --locked \
            -p krishiv -p krishiv-operator \
            -p krishiv-executor -p krishiv-scheduler \
            -p krishiv-shuffle -p krishiv-flight-sql \
            --profile release --features "full,jemalloc" \
            --target ${{ matrix.target }}

      # Embedded build: single krishiv binary, no distributed deps
      - name: Build (single-node embedded)
        run: |
          cargo build --locked \
            -p krishiv \
            --profile release \
            --no-default-features --features "embedded,jemalloc" \
            --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          OUTDIR="target/${{ matrix.target }}/release"

          # ── Full archive (all cluster daemons) ────────────────────────────
          NAME="krishiv-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${NAME}"
          cp "${OUTDIR}/krishiv"               "dist/${NAME}/"
          # Copy distributed daemon binaries — skip silently if absent on
          # macOS where some Linux-only daemons may not cross-compile.
          for BIN in krishiv-operator krishiv-executor \
                     krishiv-coordinator krishiv-clusterd \
                     krishiv-job-coordinator \
                     krishiv-shuffle-svc krishiv-flight-server; do
            [ -f "${OUTDIR}/${BIN}" ] && \
              cp "${OUTDIR}/${BIN}" "dist/${NAME}/" || true
          done
          cp README.md LICENSE "dist/${NAME}/"
          tar -C dist -czf "dist/${NAME}.tar.gz" "${NAME}"
          sha256sum "dist/${NAME}.tar.gz" > "dist/${NAME}.tar.gz.sha256"

          # ── Single-node archive (embedded binary only) ────────────────────
          SN_NAME="krishiv-${VERSION}-${{ matrix.target }}-single-node"
          mkdir -p "dist/${SN_NAME}"
          cp "${OUTDIR}/krishiv" "dist/${SN_NAME}/"
          cp README.md LICENSE "dist/${SN_NAME}/"
          tar -C dist -czf "dist/${SN_NAME}.tar.gz" "${SN_NAME}"
          sha256sum "dist/${SN_NAME}.tar.gz" > "dist/${SN_NAME}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/*.tar.gz*
          retention-days: 7

  # ── 2b. Python wheels (maturin, multi-platform) ──────────────────────────────
  build-wheels:
    name: Wheel (${{ matrix.os }} / ${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: "off"
          - os: macos-13
            target: x86_64-apple-darwin
            manylinux: "off"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: runner.os == 'macOS'
        with:
          python-version: "3.11"
      - name: Install Python (Linux)
        if: runner.os != 'macOS'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends \
            python3-pip python3-venv python3-dev
      - uses: PyO3/maturin-action@v1
        env:
          RUSTC_WRAPPER: ""
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          command: build
          args: --release --out dist/ --find-interpreter
          working-directory: crates/krishiv-python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl
          retention-days: 7

  # ── 2c. Docker images (multi-platform via buildx) ────────────────────────────
  # Three images published per release, each with a distinct tag suffix:
  #
  #   ghcr.io/org/krishiv:{version}             — k8s/full (operator + all connectors)
  #   ghcr.io/org/krishiv:{version}-single-node — embedded (one binary, no distributed deps)
  #   ghcr.io/org/krishiv:{version}-distributed — distributed cluster daemons, no K8s operator
  #
  # The k8s image also gets the bare :{major}.{minor} and :latest tags on stable releases
  # so it acts as the default pull target.

  # Default image: full k8s feature set + all cluster daemons
  docker-k8s:
    name: Docker (k8s)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ needs.validate.outputs.is_prerelease == 'false' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.distributed
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: FEATURES=k8s,jemalloc
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-k8s
          cache-to: type=gha,scope=docker-k8s,mode=max

  # Single-node embedded image: smallest possible footprint
  docker-single-node:
    name: Docker (single-node)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},suffix=-single-node
            type=semver,pattern={{major}}.{{minor}},suffix=-single-node,enable=${{ needs.validate.outputs.is_prerelease == 'false' }}
            type=raw,value=single-node,enable=${{ needs.validate.outputs.is_prerelease == 'false' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.single-node
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: FEATURES=embedded,jemalloc
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-single-node
          cache-to: type=gha,scope=docker-single-node,mode=max

  # Distributed image: all cluster daemons, no K8s operator
  docker-distributed:
    name: Docker (distributed)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},suffix=-distributed
            type=semver,pattern={{major}}.{{minor}},suffix=-distributed,enable=${{ needs.validate.outputs.is_prerelease == 'false' }}
            type=raw,value=distributed,enable=${{ needs.validate.outputs.is_prerelease == 'false' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.distributed
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: FEATURES=distributed,jemalloc
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-distributed
          cache-to: type=gha,scope=docker-distributed,mode=max

  # ── 2d. Helm chart ───────────────────────────────────────────────────────────
  helm:
    name: Helm Chart
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.0
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Stamp Chart.yaml with release version
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/k8s/helm/krishiv/Chart.yaml
          sed -i 's/^appVersion:.*/appVersion: "'"${VERSION}"'"/' deploy/k8s/helm/krishiv/Chart.yaml
      - name: Package
        run: |
          mkdir -p dist/helm
          helm package deploy/k8s/helm/krishiv --destination dist/helm
      - name: Push chart to OCI registry
        run: helm push dist/helm/krishiv-*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
      - uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/helm/*.tgz
          retention-days: 7

  # ── 3. Generate SBOM ────────────────────────────────────────────────────────
  sbom:
    name: SBOM
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate SBOM
        run: |
          python3 scripts/generate_sbom.py \
            --output sbom-${{ needs.validate.outputs.version }}.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-*.json
          retention-days: 7

  # ── 4. Upload artifacts to the GitHub Release ────────────────────────────────
  upload-assets:
    name: Upload Release Assets
    needs: [validate, build-binary, build-wheels, docker-k8s, docker-single-node, docker-distributed, helm, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/wheels/
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: dist/helm/
      - uses: actions/download-artifact@v4
        with:
          name: sbom
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/wheels/*.whl
            dist/helm/*.tgz
            dist/sbom-*.json

  # ── 5a. Publish Python wheels to PyPI (stable only) ─────────────────────────
  publish-pypi:
    name: Publish PyPI
    needs: [validate, upload-assets]

    if: needs.validate.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    environment:
      name: pypi-publish
      url: https://pypi.org/project/krishiv/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ── 5b. Publish crates to crates.io (stable only) ───────────────────────────
  publish-crates:
    name: Publish Crates.io
    needs: [validate, upload-assets]
    if: needs.validate.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    environment: crates-publish
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - name: Publish crates in topological order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e
          CRATES=(
            krishiv-common
            krishiv-proto
            krishiv-metrics
            krishiv-plan
            krishiv-dataflow
            krishiv-state
            krishiv-shuffle
            krishiv-connectors
            krishiv-sql
            krishiv-scheduler
            krishiv-executor
            krishiv-runtime
            krishiv-api
            krishiv-flight-sql
            krishiv-operator
            krishiv-ui
            krishiv
          )
          for crate in "${CRATES[@]}"; do
            echo "==> Publishing ${crate}"
            # --no-verify was intentionally removed: it skips cargo package compilation
            # which is the only gate that catches "publishes but fails to build from crates.io"
            # bugs. The 30 s sleep gives crates.io time to index the prior crate before
            # the next one's dependency resolution runs.
            cargo publish -p "${crate}" \
              || echo "WARNING: ${crate} may already be published at this version — skipping"
            sleep 30
          done
