name: Security

# Deeper scheduled scans that complement the per-PR audit in ci.yml:
#   - Trivy: filesystem CVE scan → SARIF uploaded to GitHub Security tab
#   - Gitleaks: secret scan across full commit history
#   - cargo audit: weekly advisory check (catches new CVEs against locked deps)
#   - SBOM: weekly snapshot for dependency drift tracking
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"  # Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # SARIF upload to GitHub Security tab
  checks: write           # audit-check annotations

jobs:
  # ── Trivy filesystem scan → GitHub Security tab ──────────────────────────────
  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy

  # ── Gitleaks: scan full history for accidentally committed secrets ────────────
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── cargo audit: weekly advisory check against locked dependency tree ─────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── cargo deny: license, banned crates, duplicate versions ───────────────────
  deny:
    name: License & Ban Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ── SBOM: weekly snapshot for dependency drift tracking ───────────────────────
  sbom:
    name: SBOM Snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate SBOM
        run: python3 scripts/generate_sbom.py --output sbom-$(date +%Y%m%d).json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom-*.json
          retention-days: 365
