name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"  # Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ── Vulnerability scan via cargo-audit (RustSec advisory DB) ────────────────
  audit:
    name: Dependency Audit
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Generate and archive CycloneDX SBOM ─────────────────────────────────────
  sbom:
    name: SBOM
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"
      - name: Generate SBOM
        run: python3 scripts/generate_sbom.py --output sbom-$(date +%Y%m%d).json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom-*.json
          retention-days: 365
