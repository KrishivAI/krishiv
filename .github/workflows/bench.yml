name: Benchmarks

# Only run on main branch pushes and manual dispatch — not on every PR —
# to avoid burning runner minutes on benchmark noise.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.92"
  CXXFLAGS: "-include cstdint"

jobs:
  bench:
    name: TPC-H / Nexmark
    runs-on: self-hosted
    steps:
      - name: Clean workspace (root-owned files)
        run: sudo rm -rf "$GITHUB_WORKSPACE/target" 2>/dev/null; sudo chown -R "$USER":"$USER" "$GITHUB_WORKSPACE" 2>/dev/null || true
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          clean: false
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: bench
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libssl-dev pkg-config cmake lld clang libclang-dev
      - uses: taiki-e/install-action@just

      - name: Restore main baseline
        uses: actions/cache/restore@v4
        with:
          path: target/criterion
          key: bench-baseline-main-
          restore-keys: bench-baseline-main-

      - name: Record benchmark environment
        run: |
          python3 scripts/benchmark_manifest.py \
            --suite criterion \
            --command "just bench" \
            --output benchmark-manifest.json

      - name: Run benchmarks
        run: |
          mkdir -p .tmp
          just bench | tee bench-output.txt

      - uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.sha }}
          path: |
            bench-output.txt
            benchmark-manifest.json
          retention-days: 90

      - name: Save main baseline
        run: just bench-save main

      - uses: actions/cache/save@v4
        with:
          path: target/criterion
          key: bench-baseline-main-${{ github.sha }}
