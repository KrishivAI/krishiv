name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CXXFLAGS: "-include cstdint"
  RUSTC_WRAPPER: sccache
  SCCACHE_DIR: ${{ runner.tool_cache }}/sccache

jobs:
  # ── Format + Lint ────────────────────────────────────────────────────────────
  fmt-lint:
    name: Format & Lint
    runs-on: self-hosted
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE/target" 2>/dev/null; sudo chown -R "$USER":"$USER" "$GITHUB_WORKSPACE" 2>/dev/null || true
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          components: rustfmt,clippy
      - uses: taiki-e/install-action@just
      - run: just fmt
      - run: just lint

  # ── Feature-mode compilation matrix ─────────────────────────────────────────
  # Each feature set must compile independently. 'full' also covers connectors
  # (kafka, iceberg, delta) not exercised by the other modes.
  check-modes:
    name: check (${{ matrix.mode }})
    runs-on: self-hosted
    needs: [fmt-lint]
    strategy:
      fail-fast: false
      matrix:
        mode: [embedded, single-node, bare-metal, k8s, full]
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE/target" 2>/dev/null; sudo chown -R "$USER":"$USER" "$GITHUB_WORKSPACE" 2>/dev/null || true
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          cache-key: check-${{ matrix.mode }}
          extra-apt: protobuf-compiler
      - uses: taiki-e/install-action@just
      - run: just check-${{ matrix.mode }}

  # ── Rust workspace tests ─────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: self-hosted
    needs: [fmt-lint]
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE/target" 2>/dev/null; sudo chown -R "$USER":"$USER" "$GITHUB_WORKSPACE" 2>/dev/null || true
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - uses: taiki-e/install-action@cargo-nextest
      - uses: taiki-e/install-action@just
      - run: just test

  # ── Python binding tests ─────────────────────────────────────────────────────
  test-python:
    name: Python Tests
    runs-on: self-hosted
    needs: [fmt-lint]
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE/target" 2>/dev/null; sudo chown -R "$USER":"$USER" "$GITHUB_WORKSPACE" 2>/dev/null || true
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          cache-key: python
      - name: Install Python
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends \
            python3-pip python3-venv python3-dev
      - name: Install Python deps
        run: pip3 install "maturin>=1.7,<2.0" pytest pytest-asyncio pyarrow pandas
      - name: Build and install krishiv-python
        working-directory: crates/krishiv-python
        run: maturin develop --release
      - name: Pytest
        working-directory: crates/krishiv-python
        run: pytest python/tests/ -q

  # ── Project hygiene (API surface, links, release metadata) ───────────────────
  # Python-only — no Rust toolchain needed.
  hygiene:
    name: Project Hygiene
    runs-on: self-hosted
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE/target" 2>/dev/null; sudo chown -R "$USER":"$USER" "$GITHUB_WORKSPACE" 2>/dev/null || true
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Test project scripts
        run: python3 -m unittest discover -s scripts/tests -v
      - name: Validate public API inventories and parity manifest
        run: python3 scripts/check_api_surface.py
      - name: Classify API changes against main
        run: python3 scripts/compare_api_surface.py --against-ref origin/main --report target/api-change-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: api-change-report
          path: target/api-change-report.json
      - name: Check Markdown links
        run: python3 scripts/check_markdown_links.py
      - name: Validate release metadata
        run: python3 scripts/check_release.py

  # ── Security: dependency audit + license/ban check ───────────────────────────
  # Runs on every PR so vulnerabilities are caught before merge.
  # Deeper scans (Trivy, Gitleaks) run on a schedule in security.yml.
  security:
    name: Security Audit
    runs-on: self-hosted
    permissions:
      contents: read
      checks: write
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE/target" 2>/dev/null; sudo chown -R "$USER":"$USER" "$GITHUB_WORKSPACE" 2>/dev/null || true
      - uses: actions/checkout@v4
      - name: Audit dependencies (RustSec advisory DB)
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check licenses, banned crates, and advisories
        uses: EmbarkStudios/cargo-deny-action@v2
