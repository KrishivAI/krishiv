name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "web/**"
      - "LICENSE"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "docs/GOVERNANCE.md"
      - "SECURITY.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CXXFLAGS: "-include cstdint"
  RUSTC_WRAPPER: sccache

jobs:
  # ── Format + Lint ────────────────────────────────────────────────────────────
  fmt-lint:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          components: rustfmt,clippy
      - uses: taiki-e/install-action@just
      - run: just fmt
      - run: just lint

  # ── Supply-chain gate: advisories, bans, licenses, sources (blocking) ────────
  # cargo-deny reads Cargo.lock + the RustSec advisory DB — no compilation — so
  # it runs in parallel and fails a PR fast when a dependency introduces a known
  # vulnerability, a banned crate, a disallowed license, or an unknown source.
  # security.yml re-runs this on push-to-main and weekly; this job is the
  # pre-merge gate (SEC-4, Phase 63).
  deny:
    name: Supply-chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  # ── Feature-mode compilation matrix ─────────────────────────────────────────
  check-modes:
    name: check (${{ matrix.mode }})
    runs-on: ubuntu-latest
    needs: [fmt-lint]
    strategy:
      fail-fast: false
      matrix:
        mode: [embedded, single-node, bare-metal, k8s, full]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          cache-key: check-${{ matrix.mode }}
          extra-apt: protobuf-compiler
      - uses: taiki-e/install-action@just
      - run: just check-${{ matrix.mode }}

  # ── Per-feature compilation guard ────────────────────────────────────────────
  feature-guard:
    name: Feature guard (cargo-hack)
    runs-on: ubuntu-latest
    needs: [fmt-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          cache-key: feature-guard
          extra-apt: protobuf-compiler
      - uses: taiki-e/install-action@cargo-hack
      - uses: taiki-e/install-action@just
      - run: just lint-features

  # ── Rust workspace tests ─────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [fmt-lint]
    env:
      # Flake quarantine: retries scoped to the sleep-sync crates, flaky
      # results surfaced in the summary (.config/nextest.toml, audit §14).
      NEXTEST_PROFILE: ci
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - uses: taiki-e/install-action@cargo-nextest
      - uses: taiki-e/install-action@just
      - run: just test
      # Phase 51 CI honesty: integration suites (tests/*.rs) and doctests are
      # part of the required gate, not a silent --lib accident. Tier map with
      # rationale per exclusion: docs/implementation/ci-tiers.md
      - run: just test-integration
      - run: just test-doc

  # ── External-service tests (audit §14 TEST-6) ────────────────────────────────
  # Runs the `#[ignore = "requires …"]` tests against real provisioned services
  # (postgres, MinIO, OTLP collector) so they are exercised on every PR instead
  # of rotting behind the ignore attribute. The two live-cluster tests stay out
  # until Phase 58's multi-executor harness (docs/implementation/ci-tiers.md).
  test-external:
    name: External-service Tests
    runs-on: ubuntu-latest
    needs: [fmt-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          cache-key: test-external
      - uses: taiki-e/install-action@just
      - run: scripts/external-test-services.sh up
      - run: just test-external
      - if: always()
        run: scripts/external-test-services.sh down

  # ── Python binding tests ─────────────────────────────────────────────────────
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: [fmt-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          cache-key: python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crates/krishiv-python/python/requirements*.txt
      - name: Install Python deps
        run: |
          python3 -m venv /tmp/krishiv-venv
          . /tmp/krishiv-venv/bin/activate
          pip install "maturin>=1.7,<2.0" pytest pytest-asyncio pyarrow pandas
      - name: Build and install krishiv-python
        working-directory: crates/krishiv-python
        run: |
          . /tmp/krishiv-venv/bin/activate
          maturin develop --release
      - name: Pytest
        working-directory: crates/krishiv-python
        run: |
          . /tmp/krishiv-venv/bin/activate
          pytest python/tests/ -q

  # ── Project hygiene (API surface, links, release metadata) ───────────────────
  hygiene:
    name: Project Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test project scripts
        run: python3 -m unittest discover -s scripts/tests -v
      - name: Validate public API inventories and parity manifest
        run: python3 scripts/check_api_surface.py
      - name: Classify API changes against main
        run: python3 scripts/compare_api_surface.py --against-ref origin/main --report target/api-change-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: api-change-report
          path: target/api-change-report.json
      - name: Check Markdown links
        run: python3 scripts/check_markdown_links.py
      - name: Validate release metadata
        run: python3 scripts/check_release.py
