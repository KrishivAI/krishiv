name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.92"
  TMPDIR: .tmp
  # librocksdb-sys 0.16 requires this on GCC 15+
  CXXFLAGS: "-include cstdint"

jobs:
  # ── Format + Lint ────────────────────────────────────────────────────────────
  fmt-lint:
    name: Format & Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libssl-dev pkg-config cmake lld
      - uses: taiki-e/install-action@just
      - run: just fmt
      - run: just lint

  # ── Feature-mode compilation matrix ─────────────────────────────────────────
  # Each execution mode must compile independently. A regression that breaks
  # one mode but not others will only surface here.
  check-modes:
    name: check (${{ matrix.mode }})
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: embedded
            crates: -p krishiv
          - mode: single-node
            crates: -p krishiv
          - mode: bare-metal
            crates: -p krishiv
          - mode: k8s
            crates: -p krishiv -p krishiv-operator
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: check-${{ matrix.mode }}
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libssl-dev pkg-config cmake lld protobuf-compiler
      - uses: taiki-e/install-action@just
      - run: just check-${{ matrix.mode }}

  # ── Rust workspace tests ─────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: self-hosted
    needs: [fmt-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libssl-dev pkg-config cmake lld
      - uses: taiki-e/install-action@just
      - run: just test

  # ── Python binding tests ─────────────────────────────────────────────────────
  test-python:
    name: Python Tests
    runs-on: self-hosted
    needs: [fmt-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: pip install "maturin>=1.7,<2.0" pytest pytest-asyncio pyarrow pandas
      - name: Build and install krishiv-python
        working-directory: crates/krishiv-python
        run: maturin develop --release
      - name: Pytest
        working-directory: crates/krishiv-python
        run: pytest python/tests/ -q

  # ── Project hygiene (API surface, links, release metadata) ───────────────────
  hygiene:
    name: Project Hygiene
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Test project scripts
        run: python3 -m unittest discover -s scripts/tests -v
      - name: Validate public API inventories and parity manifest
        run: python3 scripts/check_api_surface.py
      - name: Classify API changes against main
        run: python3 scripts/compare_api_surface.py --against-ref origin/main --report target/api-change-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: api-change-report
          path: target/api-change-report.json
      - name: Check Markdown links
        run: python3 scripts/check_markdown_links.py
      - name: Validate release metadata
        run: python3 scripts/check_release.py
