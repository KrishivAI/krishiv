name: Coverage

# Nightly line-coverage measurement (audit §14 TEST-4): the workspace had no
# coverage tooling at all, so thin crates could not even be identified with a
# number. Runs `just coverage` (same scope as the required test gate: lib +
# integration tests, python/chaos/bench excluded), publishes the per-crate
# table to the job summary, and uploads the lcov report as an artifact.
#
# Scheduled rather than per-PR because the instrumented build compiles the
# whole workspace from scratch (~45 min). The Phase 62 GA gate consumes the
# published number (exit criterion: a public coverage figure, not a guess).

on:
  schedule:
    - cron: "30 1 * * *" # 01:30 UTC daily, after nightly publish
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CXXFLAGS: "-include cstdint"
  RUSTC_WRAPPER: sccache

jobs:
  coverage:
    name: Line coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          cache-key: coverage
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@just
      - name: Measure coverage
        run: |
          just coverage | tee coverage-summary.txt
      - name: Produce lcov report
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info
      - name: Publish summary
        run: |
          {
            echo "## Line coverage (gate scope: lib + integration tests)"
            echo '```'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: |
            lcov.info
            coverage-summary.txt
          retention-days: 30
