name: bare-metal-e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bare-metal-cluster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92
      - name: Build cluster binaries
        run: |
          cargo +stable build -p krishiv-scheduler --bin krishiv-clusterd
          cargo +stable build -p krishiv-scheduler --bin krishiv-job-coordinator
          cargo +stable build -p krishiv-executor
      - name: Distributed scheduler smoke
        run: |
          cargo +stable test -p krishiv-scheduler --test distributed_e2e
          cargo +stable test -p krishiv-scheduler --lib barrier
          cargo +stable test -p krishiv-federation --lib
          cargo +stable test -p krishiv-exec --lib multi_source
      - name: Verify systemd templates present
        run: |
          test -f deploy/systemd/krishiv-clusterd.service
          test -f deploy/systemd/krishiv-executor@.service
