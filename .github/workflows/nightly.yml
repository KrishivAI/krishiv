name: Nightly

# Publishes a fresh build from main every night.
# Docker images are tagged :nightly and :nightly-YYYY-MM-DD.
# Python wheels are uploaded as artifacts (14-day retention).
# Full-feature cargo check is now part of the CI check-modes matrix (mode: full),
# so no separate nightly check job is needed.
on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC daily
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/krishiv
  CXXFLAGS: "-include cstdint"
  RUSTC_WRAPPER: sccache
  SCCACHE_DIR: /home/runner/.cache/sccache

permissions:
  contents: read
  packages: write

jobs:
  # ── Docker nightly (full feature set, multi-platform) ───────────────────────
  docker-nightly:
    name: Docker Nightly
    runs-on: self-hosted
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE/target" 2>/dev/null; sudo chown -R "$USER":"$USER" "$GITHUB_WORKSPACE" 2>/dev/null || true
      - uses: actions/checkout@v4
        with:
          ref: main
          clean: false
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=nightly
            type=raw,value=nightly-{{date 'YYYY-MM-DD'}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.build
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            FEATURES=full
            PROFILE=release-max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=nightly
          cache-to: type=gha,scope=nightly,mode=max

  # ── Python nightly wheels ────────────────────────────────────────────────────
  # Uploaded as artifacts only — not published to PyPI.
  # Developers can download them for integration testing before a release.
  wheels-nightly:
    name: Nightly Wheel (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: self-hosted
            target: x86_64
            manylinux: auto
          - os: self-hosted
            target: aarch64
            manylinux: auto
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: "off"
          - os: macos-13
            target: x86_64-apple-darwin
            manylinux: "off"
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE/target" 2>/dev/null; sudo chown -R "$USER":"$USER" "$GITHUB_WORKSPACE" 2>/dev/null || true
      - uses: actions/checkout@v4
        with:
          ref: main
          clean: false
      - uses: actions/setup-python@v5
        if: runner.os == 'macOS'
        with:
          python-version: "3.11"
      - name: Install Python (self-hosted)
        if: runner.os != 'macOS'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends \
            python3-pip python3-venv python3-dev
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          command: build
          args: --release --out dist/ --find-interpreter
          working-directory: crates/krishiv-python
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-wheels-${{ matrix.os }}-${{ matrix.target }}-${{ github.run_id }}
          path: dist/*.whl
          retention-days: 14
