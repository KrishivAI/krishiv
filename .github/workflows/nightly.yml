name: Nightly

# Publishes a fresh build from main every night.
# Crates published to crates.io with READMEs generated from doc comments.
# Python wheels built as artifacts (14-day retention).
# Docker images temporarily disabled (re-enable when ready).
on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC daily
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/krishiv
  CXXFLAGS: "-include cstdint"
  RUSTC_WRAPPER: sccache

permissions:
  contents: write
  packages: write

jobs:
  # ── Publish crates to crates.io (nightly version) ──────────────────────────
  # READMEs are generated from doc comments before publishing so crates.io
  # displays descriptions on each crate page.
  publish-crates:
    name: Publish Crates.io
    needs: []
    runs-on: ubuntu-latest
    environment: crates-publish
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: ./.github/actions/rust-setup
      - name: Check for changes since last publish
        id: changes
        run: |
          # Fetch tags to compare against last published nightly
          git fetch --tags
          LAST_TAG=$(git tag -l 'nightly-*' --sort=-version:refname | head -n1)
          if [ -z "$LAST_TAG" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "No previous nightly tag found — will publish"
          else
            COMMIT_COUNT=$(git rev-list "${LAST_TAG}..HEAD" --count)
            if [ "$COMMIT_COUNT" -gt 0 ]; then
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
              echo "${COMMIT_COUNT} commits since ${LAST_TAG} — will publish"
            else
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              echo "No commits since ${LAST_TAG} — skipping publish"
            fi
          fi
      - name: Generate or verify crate READMEs
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          cargo install cargo-readme --locked
          # Topological order: leaves first, roots last.
          # krishiv-bench and krishiv-chaos have publish=false and are excluded.
          CRATES=(
            krishiv-common krishiv-proto krishiv-metrics krishiv-delta
            krishiv-engine-core krishiv-ivm krishiv-plan krishiv-state krishiv-shuffle
            krishiv-connectors
            krishiv-dataflow krishiv-sql krishiv-scheduler
            krishiv-executor krishiv-ui
            krishiv-runtime krishiv-operator
            krishiv-api
            krishiv-flight-sql
            krishiv
          )
          for crate in "${CRATES[@]}"; do
            dir="crates/${crate}"
            if [ -f "${dir}/README.md" ]; then
              echo "==> ${crate}: using existing README.md"
            else
              echo "==> ${crate}: generating README.md from doc comments"
              (cd "${dir}" && cargo readme > README.md) || true
            fi
          done
      - name: Stamp nightly version
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          set -e
          STAMP="$(date +%Y%m%d%H%M)"
          NIGHTLY_VER="0.1.0-nightly.${STAMP}"
          echo "Stamping version ${NIGHTLY_VER}"
          # 1. Patch [workspace.package] version in root Cargo.toml (standalone line)
          sed -i "s/^version = \"0\.1\.0\"/version = \"${NIGHTLY_VER}\"/" Cargo.toml
          # 2. Per-crate Cargo.tomls: patch the crate's own [package] version, then
          #    patch internal dep version constraints with an EXACT ("=") prefix so
          #    cargo cannot substitute the already-published 0.1.0 stable release
          #    during `cargo publish --verify`. Without "=", semver resolves
          #    "^0.1.0-nightly.YYYYMMDD" to "0.1.0" (non-pre-release wins), which
          #    then fails to compile against the nightly-only API additions.
          find crates -name 'Cargo.toml' | while read f; do
            # Own package version (line that starts with "version =")
            sed -i "s/^version = \"0\.1\.0\"/version = \"${NIGHTLY_VER}\"/" "$f"
            # Internal dep constraints (inline tables: krishiv-* = { ..., version = "0.1.0" })
            sed -i -E "s/(krishiv-[a-z-]+ = \{[^}]*version = )\"0\.1\.0\"/\1\"=${NIGHTLY_VER}\"/g" "$f"
          done
          # Regenerate Cargo.lock with the new version
          cargo generate-lockfile
          # Also stamp the Python package version so the nightly wheels get a
          # unique version. PEP 440 format required by maturin/PyPI
          # (Cargo uses semver but PyPI needs 0.1.0aYYYYMMDDHHMM).
          sed -i "s/^version = \"0\.1\.0\"/version = \"0.1.0a${STAMP}\"/" crates/krishiv-python/pyproject.toml
      - name: Publish crates in topological order
        if: steps.changes.outputs.has_changes == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e
          # Topological order — each crate's deps are published before it.
          # krishiv-bench/chaos have publish=false and are omitted.
          CRATES=(
            krishiv-common
            krishiv-proto
            krishiv-metrics
            krishiv-delta
            krishiv-engine-core
            krishiv-ivm
            krishiv-plan
            krishiv-state
            krishiv-shuffle
            krishiv-connectors
            krishiv-dataflow
            krishiv-sql
            krishiv-scheduler
            krishiv-executor
            krishiv-ui
            krishiv-runtime
            krishiv-operator
            krishiv-api
            krishiv-flight-sql
            krishiv
          )
          for crate in "${CRATES[@]}"; do
            echo "==> Publishing ${crate}"
            # --allow-dirty: nightly builds may have uncommitted README changes from
            # cargo-readme above. --no-verify: skip the "compile from crates.io" check.
            # Some crates (krishiv-runtime, krishiv-api) have circular dev-dependencies
            # through krishiv-flight-sql that make verification impossible; CI already
            # validates builds before publish.
            cargo publish -p "${crate}" --allow-dirty --no-verify 2>&1 || true
            echo "---"
            sleep 30
          done
      - name: Tag nightly
        if: steps.changes.outputs.has_changes == 'true'
        # GITHUB_TOKEN cannot push tags that point to commits modifying
        # .github/workflows/ — GitHub blocks it without a PAT with 'workflow'
        # scope. Use continue-on-error so a tag push failure does not fail
        # the overall publish job. Set GH_WORKFLOW_PAT secret to fix this.
        continue-on-error: true
        run: |
          TOKEN="${{ secrets.GH_WORKFLOW_PAT || secrets.GITHUB_TOKEN }}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git"
          TAG="nightly-$(date +%Y%m%d-%H%M%S)"
          git tag -a "$TAG" -m "Nightly publish $TAG"
          git push origin "$TAG"

  # ── Docker nightly images ────────────────────────────────────────────────────
  # Multi-arch strategy: build each arch on its native runner (no QEMU),
  # push digest-only to GHCR, then merge into a multi-arch manifest.
  # Tags on final manifest:
  #   :nightly              → k8s/full image
  #   :nightly-single-node  → embedded single-binary image
  #   :nightly-distributed  → distributed cluster daemons (no operator)
  docker-nightly-build:
    name: Docker Nightly build (${{ matrix.variant }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: k8s
            arch: amd64
            runner: ubuntu-latest
            dockerfile: deploy/docker/Dockerfile.distributed
            features: "k8s,jemalloc"
            tag_suffix: ""
          - variant: k8s
            arch: arm64
            runner: ubuntu-24.04-arm
            dockerfile: deploy/docker/Dockerfile.distributed
            features: "k8s,jemalloc"
            tag_suffix: ""
          - variant: single-node
            arch: amd64
            runner: ubuntu-latest
            dockerfile: deploy/docker/Dockerfile.single-node
            features: "embedded,jemalloc"
            tag_suffix: "-single-node"
          - variant: single-node
            arch: arm64
            runner: ubuntu-24.04-arm
            dockerfile: deploy/docker/Dockerfile.single-node
            features: "embedded,jemalloc"
            tag_suffix: "-single-node"
          - variant: distributed
            arch: amd64
            runner: ubuntu-latest
            dockerfile: deploy/docker/Dockerfile.distributed
            features: "distributed,jemalloc"
            tag_suffix: "-distributed"
          - variant: distributed
            arch: arm64
            runner: ubuntu-24.04-arm
            dockerfile: deploy/docker/Dockerfile.distributed
            features: "distributed,jemalloc"
            tag_suffix: "-distributed"
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          push: true
          build-args: FEATURES=${{ matrix.features }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=docker-nightly-${{ matrix.variant }}-${{ matrix.arch }}
          cache-to: type=gha,scope=docker-nightly-${{ matrix.variant }}-${{ matrix.arch }},mode=max
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.variant }}-${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.variant }}-${{ matrix.arch }}
          path: /tmp/digests/${{ matrix.variant }}-${{ matrix.arch }}
          retention-days: 1

  docker-nightly-merge:
    name: Docker Nightly manifest (${{ matrix.variant }})
    needs: docker-nightly-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: k8s
            tag_suffix: ""
          - variant: single-node
            tag_suffix: "-single-node"
          - variant: distributed
            tag_suffix: "-distributed"
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v3
        if: env.DOCKERHUB_USERNAME != ''
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          pattern: digest-${{ matrix.variant }}-*
          merge-multiple: true
          path: /tmp/digests
      - name: Create and push multi-arch manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAG="nightly${{ matrix.tag_suffix }}"
          DIGESTS=$(cat /tmp/digests/${{ matrix.variant }}-* | sed 's|^|'"${IMAGE}@"'|')
          docker buildx imagetools create -t "${IMAGE}:${TAG}" ${DIGESTS}
          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            docker buildx imagetools create \
              -t "${DOCKERHUB_USERNAME}/krishiv:${TAG}" ${DIGESTS}
          fi

  # ── Docker Hub repository description ────────────────────────────────────────
  # Pushes the project README.md as the Docker Hub repository description so
  # the Docker Hub page shows documentation. Runs after image manifests so the
  # repository already exists on Docker Hub. Uses curl directly because the
  # Docker Hub API auth flow differs from the registry auth used by docker push.
  dockerhub-description:
    name: Docker Hub README
    needs: docker-nightly-merge
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Update Docker Hub repository description
        if: env.DOCKERHUB_USERNAME != ''
        continue-on-error: true
        run: |
          set -e
          # Acquire JWT token from Docker Hub API
          LOGIN_RESP=$(curl -sf -X POST "https://hub.docker.com/v2/users/login/" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}")
          JWT=$(echo "$LOGIN_RESP" | jq -r '.token // empty')
          if [ -z "$JWT" ]; then
            echo "WARNING: could not acquire Docker Hub JWT token — skipping README update"
            exit 0
          fi
          # Push README as full description
          README_JSON=$(jq -Rs '.' < README.md)
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" -X PATCH \
            "https://hub.docker.com/v2/repositories/${DOCKERHUB_USERNAME}/krishiv/" \
            -H "Content-Type: application/json" \
            -H "Authorization: JWT ${JWT}" \
            -d "{\"description\":\"Krishiv — hybrid batch and streaming compute engine\",\"full_description\":${README_JSON}}")
          echo "Docker Hub description updated (HTTP ${HTTP_CODE})"

  # ── Python nightly wheels ────────────────────────────────────────────────────
  wheels-nightly:
    name: Nightly Wheel (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: manylinux_2_28
          - os: ubuntu-24.04-arm
            target: aarch64
            manylinux: manylinux_2_28
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: "off"
          - os: macos-14
            target: x86_64-apple-darwin
            manylinux: "off"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Stamp nightly version
        # Wheels run in parallel with publish-crates. We ONLY stamp
        # pyproject.toml here (not Cargo.toml) because Cargo requires
        # semver in Cargo.toml while maturin/PyPI requires PEP 440.
        # The PEP 440 version is passed to maturin via --version flag.
        run: |
          set -e
          STAMP="$(date +%Y%m%d%H%M)"
          PEP440_VER="0.1.0a${STAMP}"
          echo "PEP440 version: ${PEP440_VER}"
          sed -i "s/^version = \"0\.1\.0\"/version = \"${PEP440_VER}\"/" crates/krishiv-python/pyproject.toml
          # Export for the maturin step
          echo "PEP440_VER=${PEP440_VER}" >> "$GITHUB_ENV"
      - uses: actions/setup-python@v5
        if: runner.os == 'macOS'
        with:
          python-version: "3.11"
      - name: Install Python (Linux)
        if: runner.os != 'macOS'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends \
            python3-pip python3-venv python3-dev
      - name: Install protobuf (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - uses: PyO3/maturin-action@v1
        env:
          RUSTC_WRAPPER: ""
          CXXFLAGS: "-include cstdint"
          # When cross-compiling to x86_64-apple-darwin on an ARM host, Rust
          # defaults to macOS 10.7 deployment target; rocksdb needs >= 10.13.
          MACOSX_DEPLOYMENT_TARGET: "10.15"
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          command: build
          args: --release --out dist/ --find-interpreter
          working-directory: crates/krishiv-python
          before-script-linux: |
            # manylinux_2_28 = AlmaLinux 8; install build deps:
            #   clang / clang-libs — rocksdb-sys uses clang-sys/bindgen (needs libclang >= 4.0;
            #                        AlmaLinux 8 ships LLVM/clang 12 via AppStream)
            #   cmake              — aws-lc-sys and rocksdb-sys build C/C++ sources via cmake
            #   protobuf-compiler  — prost-build (krishiv-proto) needs protoc at build time
            dnf install -y clang clang-libs cmake protobuf-compiler || true
            # Install mold — the fast linker. mold is not in AlmaLinux 8 repos so we
            # download the statically-linked binary from the upstream release.
            if ! command -v mold >/dev/null 2>&1; then
              MOLD_VER="2.34.1"
              ARCH="$(uname -m)"
              curl -sSL \
                "https://github.com/rui314/mold/releases/download/v${MOLD_VER}/mold-${MOLD_VER}-${ARCH}-linux.tar.gz" | \
                tar xz -C /usr/local --strip-components=1
            fi
            # Binary fallback for protoc if the package manager didn't provide it.
            if ! command -v protoc >/dev/null 2>&1; then
              PROTOC_VER="28.3"
              ARCH="$(uname -m)"
              curl -sSL \
                "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VER}/protoc-${PROTOC_VER}-linux-${ARCH}.zip" \
                -o /tmp/protoc.zip
              python3 -c "import zipfile; zipfile.ZipFile('/tmp/protoc.zip').extract('bin/protoc','/tmp/protoc')"
              mv /tmp/protoc/bin/protoc /usr/local/bin/protoc
              chmod +x /usr/local/bin/protoc
            fi
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-wheels-${{ matrix.os }}-${{ matrix.target }}-${{ github.run_id }}
          path: crates/krishiv-python/dist/*.whl
          retention-days: 14

  # ── Publish Python wheels to PyPI ───────────────────────────────────────────
  pypi-nightly:
    name: Publish to PyPI
    needs: wheels-nightly
    runs-on: ubuntu-latest
    environment: pypi-publish
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: nightly-wheels-*-${{ github.run_id }}
          merge-multiple: true
          path: dist/
      - name: List wheels
        run: ls -lh dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true
