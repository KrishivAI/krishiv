apiVersion: apps/v1
kind: Deployment
metadata:
  name: krishiv-executor
  namespace: krishiv-system
  labels:
    app.kubernetes.io/name: krishiv
    app.kubernetes.io/component: executor
    app.kubernetes.io/part-of: krishiv
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: krishiv
      app.kubernetes.io/component: executor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: krishiv
        app.kubernetes.io/component: executor
        app.kubernetes.io/part-of: krishiv
    spec:
      terminationGracePeriodSeconds: 60
      serviceAccountName: krishiv-controller
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: krishiv
                    app.kubernetes.io/component: executor
                topologyKey: kubernetes.io/hostname
      containers:
        - name: executor
          image: localhost/krishiv:local
          imagePullPolicy: Never
          command:
            - /usr/local/bin/krishiv
          args:
            - executor
            - --coordinator
            - http://krishiv-coordinator.krishiv-system.svc:2001
            - --connect
            - --heartbeat-interval-secs
            - "10"
            - --slots
            - "2"
            - --http-addr
            - 0.0.0.0:2002
            - --task-grpc-addr
            - 0.0.0.0:2005
            - --barrier-grpc-addr
            - 0.0.0.0:2006
            - --shuffle-flight-addr
            - 0.0.0.0:2004
            - --shuffle-dir
            - /tmp/krishiv-shuffle
          ports:
            - name: health
              containerPort: 2002
            - name: shuffle-flight
              containerPort: 2004
            - name: task-grpc
              containerPort: 2005
            - name: barrier-grpc
              containerPort: 2006
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: KRISHIV_EXECUTOR_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KRISHIV_TASK_SLOTS
              value: "2"
            - name: KRISHIV_REQUIRE_EXECUTOR_TASK_AUTH
              value: "true"
            - name: KRISHIV_COORDINATOR_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: krishiv-coordinator-auth
                  key: token
            - name: KRISHIV_EXECUTOR_TASK_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: krishiv-executor-task-auth
                  key: token
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "sleep 5"
      volumes: []
