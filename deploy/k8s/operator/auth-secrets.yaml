# Production auth secrets for coordinator <-> executor communication.
# Generate secure tokens in production:
#   openssl rand -base64 32 | tr -d '\n' > /tmp/token
#   kubectl create secret generic krishiv-coordinator-auth \
#       --from-literal=token=$(cat /tmp/token) -n krishiv-system
#   kubectl create secret generic krishiv-executor-task-auth \
#       --from-literal=token=$(cat /tmp/token) -n krishiv-system
#
# For dev/local: these placeholder tokens are sufficient.
# Rotate before any internet-facing deployment.
apiVersion: v1
kind: Secret
metadata:
  name: krishiv-coordinator-auth
  namespace: krishiv-system
  labels:
    app.kubernetes.io/name: krishiv
    app.kubernetes.io/part-of: krishiv
type: Opaque
data:
  # Dev token: "krishiv-dev-token" base64-encoded
  token: a3Jpc2hpdi1kZXYtdG9rZW4=
---
apiVersion: v1
kind: Secret
metadata:
  name: krishiv-executor-task-auth
  namespace: krishiv-system
  labels:
    app.kubernetes.io/name: krishiv
    app.kubernetes.io/part-of: krishiv
type: Opaque
data:
  # Dev token: "krishiv-dev-token" base64-encoded
  token: a3Jpc2hpdi1kZXYtdG9rZW4=
