apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: krishivexecutorpools.krishiv.io
spec:
  group: krishiv.io
  names:
    kind: KrishivExecutorPool
    listKind: KrishivExecutorPoolList
    plural: krishivexecutorpools
    singular: krishivexecutorpool
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                replicas:
                  type: integer
                  minimum: 1
                image:
                  type: string
                slots:
                  type: integer
                  minimum: 1
                serviceAccountName:
                  type: string
              required:
                - replicas
                - image
            status:
              type: object
              properties:
                readyReplicas:
                  type: integer
                phase:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
        - name: Phase
          type: string
          jsonPath: .status.phase
