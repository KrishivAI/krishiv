apiVersion: v1
kind: Service
metadata:
  name: krishiv-coordinator
  labels:
    app: krishiv-coordinator
spec:
  ports:
  - port: 2001
    name: grpc
  - port: 2002
    name: http
  - port: 2003
    name: flight
  clusterIP: None
  # The coordinator's /readyz is gated on having ≥1 registered executor, but
  # executors register *through this Service* — so it must publish the
  # coordinator's address before it is Ready, or the cluster deadlocks
  # (executors can't reach a not-ready coordinator to register).
  publishNotReadyAddresses: true
  selector:
    app: krishiv-coordinator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: krishiv-coordinator
spec:
  selector:
    matchLabels:
      app: krishiv-coordinator
  replicas: 1
  template:
    metadata:
      labels:
        app: krishiv-coordinator
    spec:
      containers:
      - name: coordinator
        image: localhost/krishiv:local
        imagePullPolicy: Never
        command: ["/usr/local/bin/krishiv"]
        args:
        - coordinator
        - --grpc-addr
        - "0.0.0.0:2001"
        - --flight-addr
        - "0.0.0.0:2003"
        - --http-addr
        - "0.0.0.0:2002"
        - --durability-profile
        - dev-local
        - --insecure
        ports:
        - containerPort: 2001
          name: grpc
        - containerPort: 2002
          name: http
        - containerPort: 2003
          name: flight
        readinessProbe:
          httpGet:
            path: /readyz
            port: 2002
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 2002
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: krishiv-executor
  labels:
    app: krishiv-executor
spec:
  clusterIP: None
  selector:
    app: krishiv-executor
  ports:
  - port: 2005
    name: task-grpc
  - port: 2006
    name: barrier-grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: krishiv-executor
spec:
  selector:
    matchLabels:
      app: krishiv-executor
  replicas: 2
  template:
    metadata:
      labels:
        app: krishiv-executor
    spec:
      containers:
      - name: executor
        image: localhost/krishiv:local
        imagePullPolicy: Never
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        command: ["/bin/sh", "-c"]
        args:
        - >-
          /usr/local/bin/krishiv executor
          --executor-id $POD_NAME
          --coordinator http://krishiv-coordinator.default.svc.cluster.local:2001
          --connect
        ports:
        - containerPort: 2005
          name: task-grpc
        - containerPort: 2006
          name: barrier-grpc
