[package]
name = "krishiv-rust-examples"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
license = "Apache-2.0"
publish = false

[workspace]

[dependencies]
arrow = { version = "58.3.0", features = ["json"] }
futures = "0.3.32"
krishiv = { path = "../../crates/krishiv" }
krishiv-api = { path = "../../crates/krishiv-api" }
krishiv-sql = { path = "../../crates/krishiv-sql" }
krishiv-connectors = { path = "../../crates/krishiv-connectors", features = ["lakehouse", "delta", "hudi"] }
krishiv-runtime = { path = "../../crates/krishiv-runtime" }
parquet = "58.3.0"
rdkafka = { version = "0.36", optional = false, default-features = false, features = ["tokio"] }
serde_json = "1.0.150"
tempfile = "3"
tokio = { version = "1.52.3", features = ["macros", "rt-multi-thread"] }
